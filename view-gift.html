<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>You've Received a Gift — Eleganza Naturally Beautiful</title>
<link rel="apple-touch-icon" href="app-icon-black-v2.png">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Karla:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#171210; --ink-soft:#241C18; --line:#3A2F28;
    --gold:#C9A26B; --gold-bright:#E0BE8A;
    --ivory:#F4EDE4; --ivory-dim:#B9AC9D; --ok:#A8C3A0; --error:#D98E7E;
    --sage:#8C9673; --sage-bright:#A8B48C;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    min-height:100vh;background:var(--ink);color:var(--ivory);font-family:'Karla',sans-serif;font-weight:300;
    letter-spacing:.01em;display:flex;align-items:center;justify-content:center;padding:20px;
    background-image:radial-gradient(ellipse 90% 60% at 50% 0%, rgba(201,162,107,.1), transparent 60%);
  }
  .wrap{width:100%;max-width:640px;text-align:center;position:relative}

  .sparkle-layer{position:absolute;inset:0;pointer-events:none;overflow:visible;z-index:5}
  .sparkle{position:absolute;color:var(--gold-bright);text-shadow:0 0 8px rgba(224,190,138,.85);animation:sparkle-pop 1.3s ease-out forwards}
  @keyframes sparkle-pop{
    0%{transform:scale(0) rotate(0deg);opacity:0}
    28%{transform:scale(1.25) rotate(90deg);opacity:1}
    100%{transform:scale(.15) rotate(200deg);opacity:0}
  }
  .brand{font-size:.68rem;letter-spacing:.32em;text-transform:uppercase;color:var(--ivory-dim);margin-bottom:22px}

  /* ── envelope ── */
  .envelope-stage{
    width:100%;max-width:340px;margin:20px auto 0;aspect-ratio:4/3;position:relative;
    cursor:pointer;perspective:1200px;
  }
  .envelope-stage.hidden{display:none}
  .envelope-body{
    position:absolute;left:0;right:0;bottom:0;height:72%;z-index:1;
    background:linear-gradient(180deg, var(--ink-soft), var(--ink));
    border:1px solid var(--gold);border-radius:4px 4px 10px 10px;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:20px;
    box-shadow:0 16px 40px rgba(0,0,0,.5);
  }
  .envelope-flap{
    position:absolute;left:0;right:0;top:0;height:58%;z-index:2;
    background:linear-gradient(150deg, #2c221c, var(--ink-soft));
    border:1px solid var(--gold);
    clip-path:polygon(0 0, 100% 0, 50% 92%);
    transform-origin:top center;
    transition:transform .7s cubic-bezier(.4,.2,.2,1);
  }
  .envelope-stage.opening .envelope-flap{transform:rotateX(180deg)}
  .envelope-stage.opening .envelope-body{animation:envelope-pop .5s ease .35s both}
  @keyframes envelope-pop{0%{transform:scale(1)}50%{transform:scale(1.05) translateY(-6px)}100%{transform:scale(1)}}
  .envelope-seal{
    position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);
    width:48px;height:48px;border-radius:50%;background:var(--gold);
    display:flex;align-items:center;justify-content:center;z-index:3;
    box-shadow:0 4px 16px rgba(0,0,0,.5);
  }
  .envelope-seal svg{width:26px;height:26px}
  .envelope-label{font-family:'Fraunces',serif;font-style:italic;color:var(--gold-bright);font-size:1.35rem}
  .envelope-hint{margin-top:10px;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);animation:tap-flash 1.4s ease-in-out infinite}

  /* ── landscape card, two pages ── */
  /* On narrow phones, a strict 8:5 box is too short to fit the cover page's
     logo+motif+title+hint stack — content was getting clipped by the card's
     overflow:hidden. min-height keeps everything visible; the wider
     landscape aspect-ratio only kicks in once there's room for it. */
  .card-stage{perspective:2000px;width:100%;max-width:640px;margin:0 auto;position:relative;display:none;min-height:440px}
  .card-stage.show{display:block}
  @media (min-width:560px){
    .card-stage{aspect-ratio:8/5;min-height:0}
  }
  .card{
    position:absolute;inset:0;border-radius:20px 6px 20px 6px;border:1px solid var(--gold);
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    padding:28px;overflow-y:auto;overflow-x:hidden;cursor:pointer;box-shadow:0 20px 60px rgba(0,0,0,.5);
    opacity:0;transform:scale(.97);pointer-events:none;transition:opacity .5s ease, transform .5s ease;
  }
  .card.active{opacity:1;transform:scale(1);pointer-events:auto}
  .card::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(120deg, transparent 40%, rgba(201,162,107,.09) 50%, transparent 60%);
    animation:gc-shimmer 3.4s ease-in-out infinite;
  }
  @keyframes gc-shimmer{0%,100%{opacity:.35}50%{opacity:1}}
  .card[data-design="love"]{background:radial-gradient(ellipse at 50% 0%, rgba(224,190,138,.16), var(--ink) 70%)}
  .card[data-design="christmas"]{background:radial-gradient(ellipse at 50% 0%, rgba(140,150,115,.18), var(--ink) 70%)}
  .card[data-design="milestone"]{background:radial-gradient(ellipse at 50% 0%, rgba(201,162,107,.2), var(--ink) 70%)}

  .card-logo{width:64px;height:64px;margin-bottom:6px;transition:transform .08s linear}
  .card-motif{width:74px;height:74px;margin:10px 0}
  .card-title{font-family:'Fraunces',serif;font-style:italic;font-size:1.9rem;color:var(--gold-bright)}
  .card-kicker{font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;color:var(--ivory-dim);margin-top:10px}
  .card-tap-hint{margin-top:22px;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);animation:tap-flash 1.4s ease-in-out infinite}
  @keyframes tap-flash{0%,100%{opacity:1}50%{opacity:.4}}

  .card-message{font-family:'Fraunces',serif;font-style:italic;font-size:1.15rem;line-height:1.6;color:var(--ivory);max-width:460px}
  .card-signed{margin-top:14px;color:var(--gold);font-size:.82rem;letter-spacing:.1em;text-transform:uppercase}
  .card-amount-line{margin-top:20px;color:var(--ivory-dim);font-size:.9rem}
  .card-amount-line strong{color:var(--gold-bright);font-family:'Fraunces',serif;font-size:1.2rem}
  .card-btn{
    display:inline-block;margin-top:22px;padding:15px 28px;background:var(--gold);color:var(--ink);
    text-decoration:none;border-radius:2px;font-weight:600;font-size:.78rem;letter-spacing:.22em;text-transform:uppercase;
  }

  .page-dots{display:flex;justify-content:center;gap:8px;margin-top:20px}
  .page-dot{width:8px;height:8px;border-radius:50%;background:var(--line);border:1px solid var(--gold);cursor:pointer}
  .page-dot.active{background:var(--gold)}

  .now-playing{margin-top:16px;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--sage-bright);opacity:0;transition:opacity .4s}
  .now-playing.show{opacity:1}

  .state-msg{color:var(--ivory-dim);font-size:.92rem;padding:60px 20px}
</style>
</head>
<body>
<div class="wrap">
  <p class="brand">Eleganza Naturally Beautiful</p>

  <div class="envelope-stage hidden" id="envelopeStage">
    <div class="envelope-flap" id="envelopeFlap"></div>
    <div class="envelope-seal">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 20s-8-4.9-8-10.8C4 6.3 6.2 4 9 4c1.5 0 2.7.8 3 2 .3-1.2 1.5-2 3-2 2.8 0 5 2.3 5 5.2C20 15.1 12 20 12 20z" fill="#171210"/></svg>
    </div>
    <div class="envelope-body">
      <div class="envelope-label">A Gift For You</div>
      <div class="envelope-hint">Tap to Open ✦</div>
    </div>
  </div>

  <div class="card-stage" id="cardStage">
    <div class="state-msg" id="loadingMsg">Opening your gift…</div>
  </div>
  <div class="sparkle-layer" id="sparkleLayer"></div>
  <div class="page-dots" id="pageDots" style="display:none">
    <span class="page-dot active" data-page="0"></span>
    <span class="page-dot" data-page="1"></span>
  </div>
  <p class="now-playing" id="nowPlaying"></p>
</div>

<script src="config.js"></script>
<script>
const $ = id => document.getElementById(id);
const params = new URLSearchParams(location.search);
const CODE = params.get("code") || params.get("gift");
const RPC = CONFIG.SUPABASE_URL + "/rest/v1/rpc/";
async function rpc(fn, body) {
  const res = await fetch(RPC + fn, {
    method: "POST",
    headers: { "apikey": CONFIG.SUPABASE_ANON_KEY, "Authorization": "Bearer " + CONFIG.SUPABASE_ANON_KEY, "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}
function esc(s) { return (s||"").toString().replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function fmtMoney(n) { return "TT$" + Number(n).toLocaleString(); }

const DESIGNS = {
  love: {
    title: "Because I Love You",
    track: "audio/season-love.mp3",
    trackLabel: "Love Song",
    motif: `<path d="M32 54s-22-13-22-29c0-8 6-14 14-14 4 0 8 2 8 6 0-4 4-6 8-6 8 0 14 6 14 14 0 16-22 29-22 29z" stroke="#C9A26B" stroke-width="1.4" fill="none"/>`
  },
  christmas: {
    title: "Season's Greetings",
    track: "audio/season-christmas.mp3",
    trackLabel: "Christmas",
    motif: `<g stroke="#8C9673" stroke-width="1.4" fill="none"><line x1="32" y1="6" x2="32" y2="58"/><line x1="8" y1="18" x2="56" y2="46"/><line x1="8" y1="46" x2="56" y2="18"/></g>`
  },
  milestone: {
    title: "Congratulations",
    track: "audio/season-love.mp3",
    trackLabel: "Uptempo Soca",
    motif: `<g><path d="M6 40c10-16 42-16 52 0" stroke="#C9A26B" stroke-width="1.2" fill="none"/><path d="M14 36c3-5 8-5 10 0M24 32c3-5 8-5 10 0" stroke="#C9A26B" stroke-width=".9" fill="none"/><path d="M50 36c-3-5-8-5-10 0M40 32c-3-5-8-5-10 0" stroke="#C9A26B" stroke-width=".9" fill="none"/><path d="M32 8l2.5 6.5L41 16l-5 4.5 1.3 7L32 24l-5.3 3.5L28 20 23 15.5l6.5-1z" fill="#C9A26B"/></g>`
  }
};

let audio = null, audioCtx = null, analyser = null, dataArray = null, rafId = null;

function pulseLoop() {
  if (!analyser) return;
  analyser.getByteFrequencyData(dataArray);
  let sum = 0;
  const n = Math.min(24, dataArray.length);
  for (let i = 0; i < n; i++) sum += dataArray[i];
  const avg = sum / n / 255;
  const scale = 1 + avg * 0.28;
  document.querySelectorAll(".card-logo").forEach(el => { el.style.transform = `scale(${scale})`; });
  rafId = requestAnimationFrame(pulseLoop);
}

function playTrack(design) {
  audio = new Audio(design.track);
  audio.loop = true;
  audio.volume = 0.55;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioCtx.createMediaElementSource(audio);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
  dataArray = new Uint8Array(analyser.frequencyBinCount);
  audio.play();
  pulseLoop();
  const np = $("nowPlaying");
  np.textContent = "🎵 Now playing — " + design.trackLabel;
  np.classList.add("show");
}

function burstSparkles() {
  const layer = $("sparkleLayer");
  if (!layer) return;
  const count = 18;
  for (let i = 0; i < count; i++) {
    const s = document.createElement("span");
    s.className = "sparkle";
    s.textContent = Math.random() > 0.5 ? "✦" : "✧";
    const angle = Math.random() * Math.PI * 2;
    const radius = 24 + Math.random() * 42;
    s.style.left = (50 + Math.cos(angle) * radius) + "%";
    s.style.top = (50 + Math.sin(angle) * radius * 0.55) + "%";
    s.style.fontSize = (0.75 + Math.random() * 0.95) + "rem";
    s.style.animationDelay = (Math.random() * 0.45) + "s";
    layer.appendChild(s);
    setTimeout(() => s.remove(), 1900);
  }
}

let currentPage = 0;
function showPage(i) {
  currentPage = i;
  document.querySelectorAll(".card").forEach((c, idx) => c.classList.toggle("active", idx === i));
  document.querySelectorAll(".page-dot").forEach((d, idx) => d.classList.toggle("active", idx === i));
}

async function init() {
  const envelope = $("envelopeStage");
  const stage = $("cardStage");
  if (!CODE) {
    stage.innerHTML = `<div class="state-msg">This link is missing its gift code.</div>`;
    stage.classList.add("show");
    return;
  }
  try {
    const result = await rpc("get_gift_certificate", { p_code: CODE });
    if (!result || !result.valid) {
      stage.innerHTML = `<div class="state-msg">This gift link has already been used or couldn't be found. If that seems wrong, reach out to Eleganza directly.</div>`;
      stage.classList.add("show");
      return;
    }
    const design = DESIGNS[result.design] || DESIGNS.love;
    const bookLink = `book-eleganza.html?gift=${CODE}`;

    stage.innerHTML = `
      <div class="card active" data-design="${esc(result.design)}" id="pageCover">
        <img class="card-logo" src="logo-gold.png" alt="Eleganza lotus" />
        <svg class="card-motif" viewBox="0 0 64 64" fill="none">${design.motif}</svg>
        <div class="card-title">${esc(design.title)}</div>
        <div class="card-kicker">A Gift From ${esc(result.buyer_name)}</div>
        <div class="card-tap-hint">Tap to Open ✦</div>
      </div>
      <div class="card" data-design="${esc(result.design)}" id="pageInside">
        <img class="card-logo" src="logo-gold.png" alt="Eleganza lotus" style="width:44px;height:44px" />
        <p class="card-message">"${esc(result.personal_message || "Wishing you brows that frame your story.")}"</p>
        <p class="card-signed">— ${esc(result.signed_by || result.buyer_name)}</p>
        <div class="card-amount-line">A gift worth <strong>${fmtMoney(result.amount)}</strong> awaits you</div>
        <a class="card-btn" href="${bookLink}">Redeem Your Gift</a>
      </div>
    `;

    const cover = $("pageCover");
    cover.addEventListener("click", () => {
      if (currentPage !== 0) return;
      showPage(1);
    });
    document.querySelectorAll(".page-dot").forEach(dot => {
      dot.addEventListener("click", () => showPage(Number(dot.dataset.page)));
    });

    // Envelope first — opening it is the tap that both reveals the card and
    // starts the music (the same gesture browsers require before any audio
    // can play, so this satisfies "plays on open" and the platform's
    // autoplay rule in a single motion instead of fighting each other).
    envelope.classList.remove("hidden");
    envelope.addEventListener("click", function openEnvelope() {
      envelope.removeEventListener("click", openEnvelope);
      envelope.classList.add("opening");
      playTrack(design);
      setTimeout(() => {
        envelope.style.display = "none";
        stage.classList.add("show");
        $("pageDots").style.display = "flex";
        burstSparkles();
      }, 750);
    });
  } catch (e) {
    console.error(e);
    stage.innerHTML = `<div class="state-msg">Couldn't load this gift right now — please try again shortly.</div>`;
    stage.classList.add("show");
  }
}

init();
</script>
</body>
</html>
