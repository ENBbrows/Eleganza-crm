<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eleganza — Client Intake</title>
<style>
  :root {
    --bg: #15120F; --surface: #1E1A16; --border: #2A251E;
    --text: #F5F0E6; --muted: #8C8275; --dim: #C9C2B4; --gold: #C9A14A;
    --font-display: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--font-body);
    min-height: 100vh; display: flex; justify-content: center; padding: 32px 16px;
  }
  .wrap { width: 100%; max-width: 480px; }
  .eyebrow { font-size: 11px; letter-spacing: 0.22em; color: var(--gold); font-weight: 600; text-align: center; }
  h1 { font-family: var(--font-display); font-size: 28px; text-align: center; margin: 4px 0 6px; font-weight: 500; }
  p.sub { text-align: center; color: var(--muted); font-size: 13.5px; margin-bottom: 28px; }
  label { display: block; font-size: 12px; letter-spacing: 0.04em; color: var(--dim); margin: 16px 0 6px; }
  input, select {
    width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
    padding: 12px 14px; font-size: 15px; color: var(--text); outline: none; font-family: var(--font-body);
  }
  input:focus, select:focus { border-color: var(--gold); }
  select { appearance: none; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="12" height="8"><path d="M1 1l5 5 5-5" stroke="%238C8275" fill="none" stroke-width="1.5"/></svg>'); background-repeat: no-repeat; background-position: right 14px center; }
  button {
    width: 100%; background: var(--gold); color: var(--bg); border: none;
    padding: 14px; border-radius: 4px; font-weight: 600; font-size: 15px;
    margin-top: 26px; cursor: pointer; font-family: var(--font-body);
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .msg { text-align: center; font-size: 13.5px; margin-top: 14px; min-height: 18px; }
  .msg.error { color: #D98E78; }
  .msg.success { color: #9FBF8E; }
  .success-screen { text-align: center; padding: 60px 0; display: none; }
  .success-screen.show { display: block; }
  .success-screen h2 { font-family: var(--font-display); font-size: 24px; margin-bottom: 10px; }
  .success-screen p { color: var(--muted); font-size: 14px; }
</style>
</head>
<body>
<div class="wrap" id="formScreen">
  <img src="logo-gold.png" alt="Eleganza lotus" style="width:150px;display:block;margin:0 auto 14px;">
  <div class="eyebrow">ELEGANZA</div>
  <h1>Client Registry</h1>
  <p style="font-style:italic;color:#C9A14A;text-align:center;font-size:.95rem;margin:4px 0 10px;">What once was, is not all lost</p>
  <p class="sub">Tell us a little about yourself and we'll be in touch.</p>

  <form id="intakeForm">
    <label for="name">Full Name *</label>
    <input id="name" required>

    <label for="phone">Phone Number</label>
    <input id="phone" type="tel">

    <label for="email">Email Address</label>
    <input id="email" type="email">

    <label for="occupation">Occupation</label>
    <input id="occupation">

    <label for="location">Location</label>
    <input id="location">

    <label for="service">Service of Interest</label>
    <select id="service">
      <option value="">Select…</option>
      <option value="Microblading — $2,000">Microblading — $2,000</option>
      <option value="Microblading + Shading — $2,500">Microblading + Shading — $2,500</option>
      <option value="Microblading Touch Up — $500">Microblading Touch Up — $500</option>
      <option value="Annual Microblading Fill — $1,000">Annual Microblading Fill — $1,000</option>
      <option value="Eyeliner — from $2,000">Eyeliner — from $2,000</option>
      <option value="Eyeliner Touch Up">Eyeliner Touch Up</option>
      <option value="Beard — from $2,000">Beard — from $2,000</option>
      <option value="Hairline — from $2,000">Hairline — from $2,000</option>
      <option value="Beard &amp; Hairline Touch Up — $800">Beard &amp; Hairline Touch Up — $800</option>
      <option value="Not sure yet">Not sure yet</option>
    </select>

    <label for="lastVisit">Last Visit</label>
    <select id="lastVisit">
      <option value="">Select…</option>
      <option>Within the last 6 months</option>
      <option>6–12 months ago</option>
      <option>1–2 years ago</option>
      <option>3–5 years ago</option>
      <option>5–8 years ago</option>
      <option>8–10 years ago</option>
      <option>First time</option>
    </select>

    <button type="submit" id="submitBtn">Submit</button>
    <div class="msg" id="formMsg"></div>
  </form>
</div>

<div class="success-screen" id="successScreen">
  <h2>Thank you!</h2>
  <p>Your details have been received. We'll reach out soon.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
emailjs.init("4foLQZ3s5wcPOfbs4");

const SUPABASE_URL = "https://iarygyqjsdjhibtyhncb.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhcnlneXFqc2RqaGlidHlobmNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MzgxMDMsImV4cCI6MjA5ODQxNDEwM30.BZmRug89XMlAlnJtSLmuIVsh_kQMkgb5pW_EOCZcCCk";

const form = document.getElementById("intakeForm");
const msg = document.getElementById("formMsg");
const btn = document.getElementById("submitBtn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const name = document.getElementById("name").value.trim();
  if (!name) { msg.textContent = "Please enter your name."; msg.className = "msg error"; return; }

  btn.disabled = true; btn.textContent = "Submitting…";
  msg.textContent = "";

  const payload = {
    name,
    phone: document.getElementById("phone").value.trim(),
    email: document.getElementById("email").value.trim(),
    occupation: document.getElementById("occupation").value.trim(),
    location: document.getElementById("location").value.trim(),
    last_service: document.getElementById("service").value,
    price_point: "",
    last_visit: document.getElementById("lastVisit").value,
    stage: "lead",
    tags: "",
  };

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/Clients`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Prefer": "return=minimal",
      },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error(await res.text());

    // Send post-care email via EmailJS
    const clientEmail = document.getElementById("email").value.trim();
    const clientName = document.getElementById("name").value.trim();
    if (clientEmail) {
      try {
        await emailjs.send("service_wik9yvb", "template_egmgzho", {
          to_email: clientEmail,
          to_name: clientName,
        });
      } catch (emailErr) {
        console.warn("Email send failed:", emailErr);
      }
    }

    document.getElementById("formScreen").style.display = "none";
    document.getElementById("successScreen").classList.add("show");
  } catch (err) {
    msg.textContent = "Something went wrong — please try again.";
    msg.className = "msg error";
    btn.disabled = false; btn.textContent = "Submit";
  }
});
</script>
</body>
</html>
