<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eleganza — Client Ledger</title>
<style>
  :root {
    --bg: #15120F; --surface: #1E1A16; --border: #2A251E; --border2: #3A3328;
    --text: #F5F0E6; --muted: #8C8275; --muted2: #6B665C; --dim: #C9C2B4;
    --gold: #C9A14A; --teal: #6E8C8A; --sage: #7C9473; --terracotta: #B5654A;
    --font-display: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); }
  button { font-family: var(--font-body); cursor: pointer; }

  /* Login screen */
  #loginScreen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .login-box { width: 100%; max-width: 360px; text-align: center; }
  .eyebrow { font-size: 11px; letter-spacing: 0.22em; color: var(--gold); font-weight: 600; }
  .login-box h1 { font-family: var(--font-display); font-size: 26px; margin: 4px 0 28px; font-weight: 500; }
  .login-box input {
    width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
    padding: 12px 14px; font-size: 15px; color: var(--text); outline: none; margin-bottom: 10px; font-family: var(--font-body);
  }
  .login-box button {
    width: 100%; background: var(--gold); color: var(--bg); border: none;
    padding: 13px; border-radius: 4px; font-weight: 600; font-size: 14px; margin-top: 8px;
  }
  .login-msg { font-size: 13px; color: #D98E78; margin-top: 12px; min-height: 16px; }

  /* App shell (same as before) */
  #app { display: none; }
  header {
    position: sticky; top: 0; z-index: 10;
    background: linear-gradient(180deg, var(--bg) 80%, rgba(21,18,15,0));
    backdrop-filter: blur(6px); padding: 20px 20px 14px; border-bottom: 1px solid var(--border);
  }
  .header-inner { display: flex; justify-content: space-between; align-items: flex-end; gap: 12px; flex-wrap: wrap; }
  h1.title { font-family: var(--font-display); font-size: 28px; margin-top: 2px; font-weight: 500; }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-primary {
    display: flex; align-items: center; gap: 6px; background: var(--gold); color: var(--bg); border: none;
    padding: 9px 16px; border-radius: 3px; font-weight: 600; font-size: 13px;
  }
  .btn-ghost {
    display: flex; align-items: center; gap: 6px; background: var(--surface); color: var(--dim); border: 1px solid var(--border);
    padding: 9px 14px; border-radius: 3px; font-size: 13px;
  }
  .controls { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .search-box {
    display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 3px; padding: 8px 12px; flex: 1; min-width: 200px;
  }
  .search-box input { background: transparent; border: none; outline: none; color: var(--text); font-size: 13px; width: 100%; font-family: var(--font-body); }
  select, .reminder-toggle { background: var(--surface); border: 1px solid var(--border); color: var(--dim); border-radius: 3px; padding: 8px 12px; font-size: 13px; }
  .reminder-toggle.active { border-color: var(--terracotta); color: #D98E78; background: rgba(181,101,74,0.12); }

  main.board { display: flex; gap: 14px; padding: 18px; overflow-x: auto; scroll-snap-type: x proximity; }
  .column { min-width: 250px; max-width: 270px; flex-shrink: 0; scroll-snap-align: start; }
  .column-head { display: flex; align-items: baseline; gap: 8px; padding: 4px 2px 8px; }
  .numeral { font-family: var(--font-display); font-size: 18px; }
  .column-label { font-size: 12.5px; letter-spacing: 0.04em; color: var(--dim); font-weight: 600; flex: 1; }
  .column-count { font-size: 11px; color: var(--muted2); }
  .column-rule { height: 2px; opacity: 0.5; margin-bottom: 12px; border-radius: 2px; }
  .cards { display: flex; flex-direction: column; gap: 10px; min-height: 40px; }
  .empty { color: #5A554B; font-size: 12px; font-style: italic; padding: 8px 2px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 12px;
    text-align: left; cursor: pointer; width: 100%; display: flex; flex-direction: column; gap: 5px; transition: border-color 0.15s;
  }
  .card:hover { border-color: var(--gold); }
  .card-name { font-family: var(--font-display); font-size: 15px; }
  .card-meta { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--muted); }
  .card-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 3px; }
  .chip { font-size: 10.5px; border: 1px solid; border-radius: 20px; padding: 2px 8px; display: inline-flex; align-items: center; }
  .reminder-badge { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); margin-top: 4px; padding-top: 6px; border-top: 1px solid var(--border); }
  .reminder-badge.overdue { color: #D98E78; }

  .overlay { position: fixed; inset: 0; background: rgba(10,8,6,0.7); z-index: 50; display: none; justify-content: flex-end; }
  .overlay.show { display: flex; }
  .overlay.center { justify-content: center; align-items: center; }
  .drawer { width: 100%; max-width: 420px; background: #18140F; height: 100%; overflow-y: auto; padding: 22px; border-left: 1px solid var(--border); }
  .modal { width: 92%; max-width: 420px; background: #18140F; border-radius: 6px; padding: 22px; border: 1px solid var(--border); max-height: 86vh; overflow-y: auto; }
  .drawer-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .drawer-head h2 { font-family: var(--font-display); font-size: 22px; font-weight: 500; }
  .icon-btn { background: none; border: none; color: var(--muted); font-size: 18px; line-height: 1; }
  .field-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--dim); margin-bottom: 8px; }
  .section-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted2); margin: 18px 0 8px; }
  .stage-picker { display: flex; flex-wrap: wrap; gap: 6px; }
  .stage-pill { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 20px; font-size: 12px; }
  .stage-pill.active { background: rgba(201,161,74,0.1); }
  .tag-editor { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .tag-input { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 11.5px; color: var(--text); outline: none; width: 90px; font-family: var(--font-body); }
  .reminder-edit { display: flex; gap: 8px; flex-wrap: wrap; }
  input[type=date], input[type=text], .note-input { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 9px 10px; font-size: 13px; color: var(--text); outline: none; font-family: var(--font-body); }
  .date-input { flex: 0 0 140px; }
  .note-input { flex: 1; min-width: 140px; }
  .input-full { width: 100%; margin-bottom: 10px; }
  textarea.notes { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 10px; font-size: 13px; color: var(--text); outline: none; resize: vertical; font-family: var(--font-body); }
  .drawer-footer { margin-top: 24px; border-top: 1px solid var(--border); padding-top: 16px; }
  .delete-btn { display: flex; align-items: center; gap: 6px; background: none; border: 1px solid #3A241D; color: var(--terracotta); padding: 8px 12px; border-radius: 3px; font-size: 12.5px; }
  .confirm-row { display: flex; align-items: center; gap: 10px; font-size: 12.5px; color: var(--dim); }
  .confirm-yes { background: var(--terracotta); color: #fff; border: none; padding: 6px 10px; border-radius: 3px; font-size: 12px; }
  .confirm-no { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 10px; border-radius: 3px; font-size: 12px; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--border); color: var(--text); padding: 10px 18px; border-radius: 4px; font-size: 13px; z-index: 100; border: 1px solid var(--border2); display: none; }
  .toast.show { display: block; }
  .loading-state { padding: 60px 20px; text-align: center; color: var(--muted); }
  @media (max-width: 480px) { .drawer, .modal { max-width: 100%; } }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="eyebrow">ELEGANZA</div>
    <h1>Client Ledger</h1>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button id="loginBtn">Log in</button>
    <div class="login-msg" id="loginMsg"></div>
  </div>
</div>

<div id="app">
  <header>
    <div class="header-inner">
      <div>
        <div class="eyebrow">ELEGANZA</div>
        <h1 class="title">Client Ledger</h1>
      </div>
      <div class="header-actions">
        <button class="btn-ghost" id="logoutBtn">Log out</button>
        <button class="btn-primary" id="addBtn">+ Add Client</button>
      </div>
    </div>
    <div class="controls">
      <div class="search-box">🔍 <input id="searchInput" placeholder="Search name, location, occupation…"></div>
      <select id="tagFilter"><option value="">All tags</option></select>
      <button class="reminder-toggle" id="reminderToggle">🔔 <span id="dueCount">0</span> due</button>
    </div>
  </header>
  <main class="board" id="board"></main>
</div>

<div class="loading-state" id="loadingState" style="display:none;">Loading ledger…</div>

<div class="overlay" id="drawerOverlay"><div class="drawer" id="drawer"></div></div>
<div class="overlay center" id="modalOverlay"><div class="modal" id="modalContent"></div></div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = "https://iarygyqjsdjhibtyhncb.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhcnlneXFqc2RqaGlidHlobmNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MzgxMDMsImV4cCI6MjA5ODQxNDEwM30.BZmRug89XMlAlnJtSLmuIVsh_kQMkgb5pW_EOCZcCCk";
const SESSION_KEY = "eleganza-crm-session";

const STAGES = [
  { key: "lead", label: "New Lead", numeral: "I", color: "#8C8275" },
  { key: "contacted", label: "Contacted", numeral: "II", color: "#6E8C8A" },
  { key: "booked", label: "Booked", numeral: "III", color: "#C9A14A" },
  { key: "active", label: "Active Client", numeral: "IV", color: "#7C9473" },
  { key: "lapsed", label: "Lapsed", numeral: "V", color: "#B5654A" },
];
const TAG_PALETTE = ["#C9A14A", "#7C9473", "#6E8C8A", "#B5654A", "#9B8AA3"];

let session = null;
let clients = [];
let search = "", tagFilter = "", remindersOnly = false, selectedId = null;

function esc(s) { return (s||"").toString().replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function todayStr() { return new Date().toISOString().slice(0,10); }
function daysUntil(d) { if (!d) return null; return Math.round((new Date(d) - new Date(todayStr())) / 86400000); }
function tagColor(tag) { let h=0; for(let i=0;i<tag.length;i++) h=(h*31+tag.charCodeAt(i))%TAG_PALETTE.length; return TAG_PALETTE[h]; }
function tagsToArr(t) { return (t||"").split(",").map(s=>s.trim()).filter(Boolean); }
function arrToTags(a) { return a.join(","); }
function showToast(msg) { const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2200); }

async function api(path, opts = {}) {
  const headers = {
    "apikey": SUPABASE_KEY,
    "Authorization": `Bearer ${session.access_token}`,
    "Content-Type": "application/json",
    ...opts.headers,
  };
  const res = await fetch(`${SUPABASE_URL}${path}`, { ...opts, headers });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function login(email, password) {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "apikey": SUPABASE_KEY },
    body: JSON.stringify({ email, password }),
  });
  if (!res.ok) throw new Error("Invalid login");
  const data = await res.json();
  session = data;
  localStorage.setItem(SESSION_KEY, JSON.stringify(data));
}

function logout() {
  session = null;
  localStorage.removeItem(SESSION_KEY);
  document.getElementById("app").style.display = "none";
  document.getElementById("loginScreen").style.display = "flex";
}

async function loadClients() {
  document.getElementById("loadingState").style.display = "block";
  document.getElementById("app").style.display = "none";
  try {
    const rows = await api("/rest/v1/clients?select=*&order=created_at.desc");
    clients = rows.map(r => ({ ...r, tags: tagsToArr(r.tags) }));
    document.getElementById("loadingState").style.display = "none";
    document.getElementById("app").style.display = "block";
    renderBoard();
  } catch (e) {
    document.getElementById("loadingState").textContent = "Couldn't load — session may have expired. Please log out and back in.";
  }
}

async function patchClient(id, patch) {
  const apiPatch = { ...patch };
  if ("tags" in apiPatch) apiPatch.tags = arrToTags(apiPatch.tags);
  await api(`/rest/v1/clients?id=eq.${id}`, { method: "PATCH", body: JSON.stringify(apiPatch), headers: { "Prefer": "return=minimal" } });
  clients = clients.map(c => c.id === id ? { ...c, ...patch } : c);
  renderBoard();
}

async function deleteClient(id) {
  await api(`/rest/v1/clients?id=eq.${id}`, { method: "DELETE", headers: { "Prefer": "return=minimal" } });
  clients = clients.filter(c => c.id !== id);
  selectedId = null;
  closeDrawer();
  renderBoard();
  showToast("Client removed");
}

async function addClient(data) {
  const payload = { ...data, stage: "lead", tags: "", notes: "", reminder_date: null, reminder_note: "" };
  const rows = await api("/rest/v1/clients", { method: "POST", body: JSON.stringify(payload), headers: { "Prefer": "return=representation" } });
  const row = { ...rows[0], tags: [] };
  clients = [row, ...clients];
  closeModal(); renderBoard(); showToast("Client added");
}

function renderTagFilter() {
  const tagSet = new Set();
  clients.forEach(c => c.tags.forEach(t => tagSet.add(t)));
  const sel = document.getElementById("tagFilter");
  const current = sel.value;
  sel.innerHTML = '<option value="">All tags</option>' + Array.from(tagSet).sort().map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join("");
  sel.value = tagSet.has(current) ? current : "";
}

function renderBoard() {
  const due = clients.filter(c => c.reminder_date && daysUntil(c.reminder_date) <= 0);
  document.getElementById("dueCount").textContent = due.length;
  const q = search.trim().toLowerCase();
  const filtered = clients.filter(c => {
    const matchesSearch = !q || (c.name||"").toLowerCase().includes(q) || (c.location||"").toLowerCase().includes(q) || (c.occupation||"").toLowerCase().includes(q);
    const matchesTag = !tagFilter || c.tags.includes(tagFilter);
    const matchesReminder = !remindersOnly || (c.reminder_date && daysUntil(c.reminder_date) <= 0);
    return matchesSearch && matchesTag && matchesReminder;
  });
  const board = document.getElementById("board");
  board.innerHTML = STAGES.map(stage => {
    const stageClients = filtered.filter(c => c.stage === stage.key);
    const cards = stageClients.length === 0 ? '<div class="empty">No one here yet</div>' : stageClients.map(c => {
      const d = c.reminder_date ? daysUntil(c.reminder_date) : null;
      const tagsHtml = c.tags.length ? `<div class="card-tags">${c.tags.map(t => `<span class="chip" style="border-color:${tagColor(t)};color:${tagColor(t)}">${esc(t)}</span>`).join("")}</div>` : "";
      const remHtml = d !== null ? `<div class="reminder-badge${d<=0?' overdue':''}">📅 ${d<0?Math.abs(d)+'d overdue':d===0?'Due today':'in '+d+'d'}</div>` : "";
      return `<button class="card" data-id="${c.id}">
        <div class="card-name">${esc(c.name)}</div>
        <div class="card-meta">📍 ${esc(c.location)||"—"}</div>
        <div class="card-meta">💼 ${esc(c.last_service)||"—"}</div>
        ${tagsHtml}${remHtml}
      </button>`;
    }).join("");
    return `<section class="column">
      <div class="column-head"><span class="numeral" style="color:${stage.color}">${stage.numeral}</span><span class="column-label">${stage.label}</span><span class="column-count">${stageClients.length}</span></div>
      <div class="column-rule" style="background:${stage.color}"></div>
      <div class="cards">${cards}</div>
    </section>`;
  }).join("");
  board.querySelectorAll(".card").forEach(btn => btn.addEventListener("click", () => { selectedId = btn.dataset.id; openDrawer(); }));
  renderTagFilter();
}

function openDrawer() {
  const c = clients.find(x => String(x.id) === String(selectedId));
  if (!c) return;
  const drawer = document.getElementById("drawer");
  drawer.innerHTML = `
    <div class="drawer-head"><h2>${esc(c.name)}</h2><button class="icon-btn" id="closeDrawer">✕</button></div>
    <div class="field-row">📞 <span>${esc(c.phone)||"—"}</span></div>
    <div class="field-row">✉️ <span>${esc(c.email)||"—"}</span></div>
    <div class="field-row">💼 <span>${esc(c.occupation)||"—"}</span></div>
    <div class="field-row">📍 <span>${esc(c.location)||"—"}</span></div>
    <div class="field-row">🕒 <span>${esc(c.last_service)||"—"} · ${esc(c.price_point)||"—"} · last visit ${esc(c.last_visit)||"—"}</span></div>
    <div class="section-label">Stage</div>
    <div class="stage-picker">${STAGES.map(s => `<button class="stage-pill${c.stage===s.key?' active':''}" style="${c.stage===s.key?`border-color:${s.color};color:${s.color}`:''}" data-stage="${s.key}">${s.label}</button>`).join("")}</div>
    <div class="section-label">Tags</div>
    <div class="tag-editor" id="tagEditor">
      ${c.tags.map(t => `<span class="chip" style="border-color:${tagColor(t)};color:${tagColor(t)}">${esc(t)} <span data-remove-tag="${esc(t)}" style="margin-left:4px;cursor:pointer">✕</span></span>`).join("")}
      <input class="tag-input" id="tagInput" placeholder="+ tag">
    </div>
    <div class="section-label">Follow-up reminder</div>
    <div class="reminder-edit">
      <input type="date" class="date-input" id="reminderDate" value="${c.reminder_date||''}">
      <input type="text" class="note-input" id="reminderNote" placeholder="What to follow up on…" value="${esc(c.reminder_note)}">
    </div>
    <div class="section-label">Notes</div>
    <textarea class="notes" rows="4" id="notesField" placeholder="Conversation history, preferences…">${esc(c.notes)}</textarea>
    <div class="drawer-footer" id="drawerFooter"><button class="delete-btn" id="deleteBtn">🗑 Remove client</button></div>
  `;
  document.getElementById("closeDrawer").onclick = closeDrawer;
  drawer.querySelectorAll("[data-stage]").forEach(btn => btn.onclick = async () => { await patchClient(c.id, { stage: btn.dataset.stage }); openDrawer(); });
  drawer.querySelectorAll("[data-remove-tag]").forEach(btn => btn.onclick = async () => { await patchClient(c.id, { tags: c.tags.filter(t => t !== btn.dataset.removeTag) }); openDrawer(); });
  document.getElementById("tagInput").addEventListener("keydown", async e => {
    if (e.key === "Enter") {
      const t = e.target.value.trim();
      if (t && !c.tags.includes(t)) { await patchClient(c.id, { tags: [...c.tags, t] }); openDrawer(); }
    }
  });
  document.getElementById("reminderDate").addEventListener("change", async e => { await patchClient(c.id, { reminder_date: e.target.value || null }); });
  document.getElementById("reminderNote").addEventListener("change", async e => { await patchClient(c.id, { reminder_note: e.target.value }); });
  document.getElementById("notesField").addEventListener("change", async e => { await patchClient(c.id, { notes: e.target.value }); });
  document.getElementById("deleteBtn").onclick = () => {
    document.getElementById("drawerFooter").innerHTML = `<div class="confirm-row"><span>Remove permanently?</span><button class="confirm-yes" id="confirmYes">✓ Yes</button><button class="confirm-no" id="confirmNo">Cancel</button></div>`;
    document.getElementById("confirmYes").onclick = () => deleteClient(c.id);
    document.getElementById("confirmNo").onclick = openDrawer;
  };
  document.getElementById("drawerOverlay").classList.add("show");
}
function closeDrawer() { document.getElementById("drawerOverlay").classList.remove("show"); selectedId = null; }

function openAddModal() {
  const content = document.getElementById("modalContent");
  content.innerHTML = `
    <div class="drawer-head"><h2>New client</h2><button class="icon-btn" id="closeModal">✕</button></div>
    <input class="input-full" id="f_name" placeholder="Full name *">
    <input class="input-full" id="f_phone" placeholder="Phone">
    <input class="input-full" id="f_email" placeholder="Email">
    <input class="input-full" id="f_occupation" placeholder="Occupation">
    <input class="input-full" id="f_location" placeholder="Location">
    <input class="input-full" id="f_service" placeholder="Service of interest">
    <button class="btn-primary" id="submitAdd" style="width:100%;justify-content:center">+ Add to ledger</button>
  `;
  document.getElementById("closeModal").onclick = closeModal;
  document.getElementById("submitAdd").onclick = async () => {
    const name = document.getElementById("f_name").value.trim();
    if (!name) return;
    await addClient({
      name,
      phone: document.getElementById("f_phone").value,
      email: document.getElementById("f_email").value,
      occupation: document.getElementById("f_occupation").value,
      location: document.getElementById("f_location").value,
      last_service: document.getElementById("f_service").value,
      price_point: "", last_visit: "",
    });
  };
  document.getElementById("modalOverlay").classList.add("show");
}
function closeModal() { document.getElementById("modalOverlay").classList.remove("show"); }

document.getElementById("addBtn").onclick = openAddModal;
document.getElementById("logoutBtn").onclick = logout;
document.getElementById("drawerOverlay").addEventListener("click", e => { if (e.target.id === "drawerOverlay") closeDrawer(); });
document.getElementById("modalOverlay").addEventListener("click", e => { if (e.target.id === "modalOverlay") closeModal(); });
document.getElementById("searchInput").addEventListener("input", e => { search = e.target.value; renderBoard(); });
document.getElementById("tagFilter").addEventListener("change", e => { tagFilter = e.target.value; renderBoard(); });
document.getElementById("reminderToggle").addEventListener("click", function() { remindersOnly = !remindersOnly; this.classList.toggle("active", remindersOnly); renderBoard(); });

document.getElementById("loginBtn").onclick = async () => {
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;
  const msgEl = document.getElementById("loginMsg");
  msgEl.textContent = "";
  try {
    await login(email, password);
    document.getElementById("loginScreen").style.display = "none";
    await loadClients();
  } catch (e) {
    msgEl.textContent = "Incorrect email or password.";
  }
};

(async function init() {
  const saved = localStorage.getItem(SESSION_KEY);
  if (saved) {
    session = JSON.parse(saved);
    document.getElementById("loginScreen").style.display = "none";
    await loadClients();
  }
})();
</script>
</body>
</html>
