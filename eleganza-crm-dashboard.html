<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eleganza CRM</title>
<link rel="apple-touch-icon" href="logo-gold.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Eleganza CRM">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#15120F">
<style>
  :root {
    --bg: #15120F; --surface: #1E1A16; --border: #2A251E; --border2: #3A3328;
    --text: #F5F0E6; --muted: #E8DFD3; --muted2: #6B665C; --dim: #D9D0C3;
    --gold: #C9A14A; --teal: #6E8C8A; --sage: #7C9473; --terracotta: #B5654A; --zest: #C6F24E;
    --font-display: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); }
  button, input, select, textarea { font-family: var(--font-body); }
  button { cursor: pointer; }

  /* Login screen */
  #loginScreen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .login-box { width: 100%; max-width: 360px; text-align: center; }
  .eyebrow { font-size: 11px; letter-spacing: 0.22em; color: var(--gold); font-weight: 600; }
  .login-box h1 { font-family: var(--font-display); font-size: 26px; margin: 4px 0 28px; font-weight: 500; }
  .login-box input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 12px 14px; font-size: 15px; color: var(--text); outline: none; margin-bottom: 10px; }
  .login-box button { width: 100%; background: var(--gold); color: var(--bg); border: none; padding: 13px; border-radius: 4px; font-weight: 600; font-size: 14px; margin-top: 8px; }
  .login-msg { font-size: 13px; color: #D98E78; margin-top: 12px; min-height: 16px; }

  /* App shell */
  #app { display: none; }
  header { position: sticky; top: 0; z-index: 10; background: linear-gradient(180deg, var(--bg) 82%, rgba(21,18,15,0)); backdrop-filter: blur(6px); padding: 20px 20px 14px; border-bottom: 1px solid var(--border); }
  .header-inner { display: flex; justify-content: space-between; align-items: flex-end; gap: 12px; flex-wrap: wrap; }
  h1.title { font-family: var(--font-display); font-size: 26px; margin-top: 2px; font-weight: 500; }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-primary { display: flex; align-items: center; gap: 6px; background: var(--gold); color: var(--bg); border: none; padding: 9px 16px; border-radius: 3px; font-weight: 600; font-size: 13px; }
  .btn-ghost { display: flex; align-items: center; gap: 6px; background: var(--surface); color: var(--dim); border: 1px solid var(--border); padding: 9px 14px; border-radius: 3px; font-size: 13px; }

  .view-tabs { display: flex; gap: 6px; margin-top: 14px; }
  .view-tabs .tab { background: var(--surface); border: 1px solid var(--border); color: var(--dim); padding: 8px 18px; border-radius: 20px; font-size: 13.5px; font-weight: 600; }
  .view-tabs .tab.active { border-color: var(--gold); color: var(--gold); background: rgba(201,161,74,0.1); }

  .tabs { display: flex; gap: 6px; }
  .tab { background: var(--surface); border: 1px solid var(--border); color: var(--dim); padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; }
  .tab.active { border-color: var(--gold); color: var(--gold); background: rgba(201,161,74,0.1); }
  .tab[data-biz="enbfocus"].active { border-color: var(--zest); color: var(--zest); background: rgba(198,242,78,0.08); }

  .controls { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .search-box { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 8px 12px; flex: 1; min-width: 200px; }
  .search-box input { background: transparent; border: none; outline: none; color: var(--text); font-size: 13px; width: 100%; }
  select, .reminder-toggle { background: var(--surface); border: 1px solid var(--border); color: var(--dim); border-radius: 3px; padding: 8px 12px; font-size: 13px; }
  .reminder-toggle.active { border-color: var(--terracotta); color: #D98E78; background: rgba(181,101,74,0.12); }

  /* Clients board */
  main.board { display: flex; gap: 14px; padding: 18px; overflow-x: auto; scroll-snap-type: x proximity; }
  .column { min-width: 250px; max-width: 270px; flex-shrink: 0; scroll-snap-align: start; }
  .column-head { display: flex; align-items: baseline; gap: 8px; padding: 4px 2px 8px; }
  .numeral { font-family: var(--font-display); font-size: 18px; }
  .column-label { font-size: 12.5px; letter-spacing: 0.04em; color: var(--dim); font-weight: 600; flex: 1; }
  .column-count { font-size: 11px; color: var(--muted2); }
  .column-rule { height: 2px; opacity: 0.5; margin-bottom: 12px; border-radius: 2px; }
  .cards { display: flex; flex-direction: column; gap: 10px; min-height: 40px; }
  .empty { color: #5A554B; font-size: 12px; font-style: italic; padding: 8px 2px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 12px; text-align: left; cursor: pointer; width: 100%; display: flex; flex-direction: column; gap: 5px; transition: border-color 0.15s; }
  .card:hover { border-color: var(--gold); }
  .card-name { font-family: var(--font-display); font-size: 15px; }
  .card-meta { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--muted); }
  .card-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 3px; }
  .chip { font-size: 10.5px; border: 1px solid; border-radius: 20px; padding: 2px 8px; display: inline-flex; align-items: center; }
  .reminder-badge { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); margin-top: 4px; padding-top: 6px; border-top: 1px solid var(--border); }
  .reminder-badge.overdue { color: #D98E78; }

  /* Calendar view */
  main.wrap { padding: 20px; max-width: 900px; margin: 0 auto; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px; margin-bottom: 20px; }
  .panel-title { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted2); margin-bottom: 12px; font-weight: 600; }
  .due-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .due-row:last-child { border-bottom: none; }
  .due-info { font-size: 13px; }
  .due-info strong { font-family: var(--font-display); font-size: 15px; font-weight: 500; }
  .due-badge { font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 8px; border-radius: 20px; border: 1px solid var(--terracotta); color: #D98E78; margin-left: 8px; }
  .due-actions { display: flex; gap: 6px; }
  .due-actions button { font-size: 11.5px; padding: 6px 10px; border-radius: 3px; border: 1px solid var(--border); background: var(--bg); color: var(--dim); }
  .due-actions button.wa { border-color: var(--sage); color: #A8C3A0; }
  .week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .week-nav button { background: var(--surface); border: 1px solid var(--border); color: var(--dim); padding: 6px 12px; border-radius: 3px; }
  .week-label { font-family: var(--font-display); font-size: 16px; }
  .day-group { margin-bottom: 16px; }
  .day-head { font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted2); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .booking-row { display: flex; align-items: center; gap: 10px; padding: 10px 8px; border-radius: 4px; cursor: pointer; }
  .booking-row:hover { background: var(--bg); }
  .booking-time { font-family: var(--font-display); font-size: 14px; width: 70px; flex-shrink: 0; color: var(--gold); }
  .booking-info { flex: 1; font-size: 13px; }
  .booking-info .name { font-weight: 600; }
  .booking-info .meta { color: var(--muted2); font-size: 11.5px; margin-top: 2px; }
  .status-pill { font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; padding: 3px 8px; border-radius: 20px; border: 1px solid; flex-shrink: 0; }
  .status-tentative { border-color: var(--terracotta); color: #D98E78; }
  .status-confirmed { border-color: var(--gold); color: var(--gold); }
  .status-checked_in { border-color: var(--teal); color: var(--teal); }
  .status-completed { border-color: var(--sage); color: var(--sage); }
  .status-cancelled { border-color: var(--muted2); color: var(--muted2); }
  .status-no_show { border-color: var(--terracotta); color: var(--terracotta); }
  .intake-box { font-size: 12.5px; color: var(--dim); line-height: 1.6; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 12px; }
  .intake-box strong { color: var(--text); display: block; margin-top: 8px; }
  .intake-box strong:first-child { margin-top: 0; }
  .enbfocus-stage-pill { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 20px; font-size: 12px; }
  .enbfocus-stage-pill.active { border-color: var(--zest); color: var(--zest); background: rgba(198,242,78,0.08); }
  .action-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
  .action-row button { flex: 1; min-width: 110px; padding: 10px; border-radius: 3px; border: 1px solid var(--border); background: var(--surface); color: var(--dim); font-size: 12.5px; }
  .action-row button.primary { border-color: var(--gold); color: var(--gold); }
  .action-row button.danger { border-color: var(--terracotta); color: #D98E78; }

  /* Shared drawer/modal */
  .overlay { position: fixed; inset: 0; background: rgba(10,8,6,0.7); z-index: 50; display: none; justify-content: flex-end; }
  .overlay.show { display: flex; }
  .overlay.center { justify-content: center; align-items: center; }
  .drawer { width: 100%; max-width: 420px; background: #18140F; height: 100%; overflow-y: auto; padding: 22px; border-left: 1px solid var(--border); }
  .modal { width: 92%; max-width: 420px; background: #18140F; border-radius: 6px; padding: 22px; border: 1px solid var(--border); max-height: 86vh; overflow-y: auto; }
  .drawer-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .drawer-head h2 { font-family: var(--font-display); font-size: 22px; font-weight: 500; }
  .icon-btn { background: none; border: none; color: var(--muted); font-size: 18px; line-height: 1; }
  .field-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--dim); margin-bottom: 8px; }
  .field-row strong { color: var(--text); }
  .section-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted2); margin: 18px 0 8px; }
  .stage-picker { display: flex; flex-wrap: wrap; gap: 6px; }
  .stage-pill { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 20px; font-size: 12px; }
  .stage-pill.active { background: rgba(201,161,74,0.1); }
  .tag-editor { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .tag-input { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 11.5px; color: var(--text); outline: none; width: 90px; }
  .reminder-edit { display: flex; gap: 8px; flex-wrap: wrap; }
  input[type=date], input[type=time], input[type=number], input[type=text], .note-input { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 9px 10px; font-size: 13px; color: var(--text); outline: none; }
  .date-input { flex: 0 0 140px; }
  .note-input { flex: 1; min-width: 140px; }
  .input-full { width: 100%; margin-bottom: 10px; }
  textarea.notes { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 10px; font-size: 13px; color: var(--text); outline: none; resize: vertical; }
  .drawer-footer { margin-top: 24px; border-top: 1px solid var(--border); padding-top: 16px; }
  .delete-btn { display: flex; align-items: center; gap: 6px; background: none; border: 1px solid #3A241D; color: var(--terracotta); padding: 8px 12px; border-radius: 3px; font-size: 12.5px; }
  .confirm-row { display: flex; align-items: center; gap: 10px; font-size: 12.5px; color: var(--dim); }
  .confirm-yes { background: var(--terracotta); color: #fff; border: none; padding: 6px 10px; border-radius: 3px; font-size: 12px; }
  .confirm-no { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 10px; border-radius: 3px; font-size: 12px; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--border); color: var(--text); padding: 10px 18px; border-radius: 4px; font-size: 13px; z-index: 100; border: 1px solid var(--border2); display: none; }
  .toast.show { display: block; }
  .loading-state { padding: 60px 20px; text-align: center; color: var(--muted); }
  @media (max-width: 480px) { .drawer, .modal { max-width: 100%; } .booking-time { width: 56px; } }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="eyebrow">ELEGANZA</div>
    <h1>Eleganza CRM</h1>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button id="loginBtn">Log in</button>
    <div class="login-msg" id="loginMsg"></div>
  </div>
</div>

<div id="app">
  <header>
    <div class="header-inner">
      <div>
        <div class="eyebrow">ELEGANZA</div>
        <h1 class="title" id="pageTitle">Client Ledger</h1>
      </div>
      <div class="header-actions">
        <button class="btn-ghost" id="logoutBtn">Log out</button>
        <button class="btn-ghost" id="blockBtn" style="display:none">Block time off</button>
        <button class="btn-primary" id="addBtn">+ Add Client</button>
        <button class="btn-primary" id="newBookingBtn" style="display:none">+ New booking</button>
      </div>
    </div>
    <div class="view-tabs" id="viewTabs">
      <button class="tab active" data-view="clients">Clients</button>
      <button class="tab" data-view="calendar">Calendar</button>
    </div>
    <div class="controls" id="clientControls">
      <div class="search-box">🔍 <input id="searchInput" placeholder="Search name, location, occupation…"></div>
      <select id="tagFilter"><option value="">All tags</option></select>
      <button class="reminder-toggle" id="reminderToggle">🔔 <span id="dueCount">0</span> due</button>
    </div>
    <div class="tabs" id="bizTabs" style="display:none;margin-top:12px">
      <button class="tab active" data-biz="eleganza">Eleganza</button>
      <button class="tab" data-biz="enbfocus">ENBfocus</button>
    </div>
  </header>

  <main class="board" id="board"></main>

  <main class="wrap" id="calendarMain" style="display:none">
    <div class="panel" id="duePanel">
      <div class="panel-title">Reminders due now</div>
      <div id="dueList"></div>
    </div>
    <div class="week-nav">
      <button id="prevWeek">← Prev</button>
      <div class="week-label" id="weekLabel"></div>
      <button id="nextWeek">Next →</button>
    </div>
    <div id="weekBoard"></div>
  </main>
</div>

<div class="loading-state" id="loadingState" style="display:none;">Loading…</div>

<div class="overlay" id="drawerOverlay"><div class="drawer" id="drawer"></div></div>
<div class="overlay center" id="modalOverlay"><div class="modal" id="modalContent"></div></div>
<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script>
const SUPABASE_URL = CONFIG.SUPABASE_URL;
const SUPABASE_KEY = CONFIG.SUPABASE_ANON_KEY;
const SESSION_KEY = "eleganza-crm-session";
const TZ = "America/Port_of_Spain";

const STAGES = [
  { key: "lead", label: "New Lead", numeral: "I", color: "#8C8275" },
  { key: "contacted", label: "Contacted", numeral: "II", color: "#6E8C8A" },
  { key: "booked", label: "Booked", numeral: "III", color: "#C9A14A" },
  { key: "active", label: "Active Client", numeral: "IV", color: "#7C9473" },
  { key: "lapsed", label: "Lapsed", numeral: "V", color: "#B5654A" },
];
const TAG_PALETTE = ["#C9A14A", "#7C9473", "#6E8C8A", "#B5654A", "#9B8AA3"];

let session = null;
let activeView = "clients";

// Clients state
let clients = [];
let search = "", tagFilter = "", remindersOnly = false, clientSelectedId = null;

// Calendar state
let biz = "eleganza";
let weekStart = startOfWeek(new Date());
let bookings = [];
let bookingSelectedId = null;

function $(id) { return document.getElementById(id); }
function esc(s) { return (s||"").toString().replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function showToast(msg) { const t=$("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2200); }
function todayStr() { return new Date().toISOString().slice(0,10); }
function daysUntil(d) { if (!d) return null; return Math.round((new Date(d) - new Date(todayStr())) / 86400000); }
function tagColor(tag) { let h=0; for(let i=0;i<tag.length;i++) h=(h*31+tag.charCodeAt(i))%TAG_PALETTE.length; return TAG_PALETTE[h]; }
function tagsToArr(t) { return (t||"").split(",").map(s=>s.trim()).filter(Boolean); }
function arrToTags(a) { return a.join(","); }
function startOfWeek(d) { const x = new Date(d); const day = x.getDay(); x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x; }
function fmtWhen(iso, opts) { return new Date(iso).toLocaleString("en-US", { timeZone: TZ, ...opts }); }
function digits(s) { return (s||"").replace(/\D/g,""); }
function intlPhone(phone) {
  const d = digits(phone);
  if (d.length === 7) return "1868" + d;
  if (d.length === 10 && d.startsWith("868")) return "1" + d;
  if (d.length === 11 && d.startsWith("1868")) return d;
  if (d.length >= 10) return d;
  return "";
}

async function api(path, opts = {}, retried = false) {
  const headers = { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${session.access_token}`, "Content-Type": "application/json", ...opts.headers };
  const res = await fetch(`${SUPABASE_URL}${path}`, { ...opts, headers });
  if (res.status === 401 && !retried && session.refresh_token) {
    try {
      await refreshSession();
      return api(path, opts, true);
    } catch (_) { /* fall through to error below */ }
  }
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}
async function rpc(fn, body) { return api(`/rest/v1/rpc/${fn}`, { method: "POST", body: JSON.stringify(body) }); }

async function login(email, password) {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
    method: "POST", headers: { "Content-Type": "application/json", "apikey": SUPABASE_KEY },
    body: JSON.stringify({ email, password }),
  });
  if (!res.ok) throw new Error("Invalid login");
  session = await res.json();
  localStorage.setItem(SESSION_KEY, JSON.stringify(session));
}
async function refreshSession() {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
    method: "POST", headers: { "Content-Type": "application/json", "apikey": SUPABASE_KEY },
    body: JSON.stringify({ refresh_token: session.refresh_token }),
  });
  if (!res.ok) throw new Error("Session expired");
  session = await res.json();
  localStorage.setItem(SESSION_KEY, JSON.stringify(session));
}
function logout() {
  session = null;
  localStorage.removeItem(SESSION_KEY);
  $("app").style.display = "none";
  $("loginScreen").style.display = "flex";
}

/* ───────────────────── View switching ───────────────────── */
function setView(view) {
  activeView = view;
  document.querySelectorAll("#viewTabs .tab").forEach(t => t.classList.toggle("active", t.dataset.view === view));
  const isClients = view === "clients";
  $("board").style.display = isClients ? "flex" : "none";
  $("calendarMain").style.display = isClients ? "none" : "block";
  $("clientControls").style.display = isClients ? "flex" : "none";
  $("bizTabs").style.display = isClients ? "none" : "flex";
  $("addBtn").style.display = isClients ? "flex" : "none";
  $("blockBtn").style.display = isClients ? "none" : "flex";
  $("newBookingBtn").style.display = isClients ? "none" : "flex";
  $("pageTitle").textContent = isClients ? "Client Ledger" : "Calendar";
  if (isClients) loadClients();
  else loadAllCalendar();
}
document.querySelectorAll("#viewTabs .tab").forEach(t => t.onclick = () => setView(t.dataset.view));

/* ───────────────────── Clients (ledger) ───────────────────── */
async function loadClients() {
  $("loadingState").style.display = "block";
  $("app").style.display = "none";
  try {
    const rows = await api("/rest/v1/Clients?select=*&order=created_at.desc");
    clients = rows.map(r => ({ ...r, tags: tagsToArr(r.tags) }));
    $("loadingState").style.display = "none";
    $("app").style.display = "block";
    renderBoard();
  } catch (e) {
    $("loadingState").innerHTML = "Couldn't load — session may have expired.<br><br>" +
      '<button class="btn-primary" style="width:auto;display:inline-flex" onclick="logout()">Log out and try again</button>';
  }
}

async function patchClient(id, patch) {
  const apiPatch = { ...patch };
  if ("tags" in apiPatch) apiPatch.tags = arrToTags(apiPatch.tags);
  await api(`/rest/v1/Clients?id=eq.${id}`, { method: "PATCH", body: JSON.stringify(apiPatch), headers: { "Prefer": "return=minimal" } });
  clients = clients.map(c => c.id === id ? { ...c, ...patch } : c);
  renderBoard();
}

async function deleteClient(id) {
  await api(`/rest/v1/Clients?id=eq.${id}`, { method: "DELETE", headers: { "Prefer": "return=minimal" } });
  clients = clients.filter(c => c.id !== id);
  clientSelectedId = null;
  closeDrawer();
  renderBoard();
  showToast("Client removed");
}

async function addClient(data) {
  const payload = { ...data, stage: "lead", tags: "", notes: "", reminder_date: null, reminder_note: "" };
  const rows = await api("/rest/v1/Clients", { method: "POST", body: JSON.stringify(payload), headers: { "Prefer": "return=representation" } });
  const row = { ...rows[0], tags: [] };
  clients = [row, ...clients];
  closeModal(); renderBoard(); showToast("Client added");
}

function renderTagFilter() {
  const tagSet = new Set();
  clients.forEach(c => c.tags.forEach(t => tagSet.add(t)));
  const sel = $("tagFilter");
  const current = sel.value;
  sel.innerHTML = '<option value="">All tags</option>' + Array.from(tagSet).sort().map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join("");
  sel.value = tagSet.has(current) ? current : "";
}

function renderBoard() {
  const due = clients.filter(c => c.reminder_date && daysUntil(c.reminder_date) <= 0);
  $("dueCount").textContent = due.length;
  const q = search.trim().toLowerCase();
  const filtered = clients.filter(c => {
    const matchesSearch = !q || (c.name||"").toLowerCase().includes(q) || (c.location||"").toLowerCase().includes(q) || (c.occupation||"").toLowerCase().includes(q);
    const matchesTag = !tagFilter || c.tags.includes(tagFilter);
    const matchesReminder = !remindersOnly || (c.reminder_date && daysUntil(c.reminder_date) <= 0);
    return matchesSearch && matchesTag && matchesReminder;
  });
  const board = $("board");
  board.innerHTML = STAGES.map(stage => {
    const stageClients = filtered.filter(c => c.stage === stage.key);
    const cards = stageClients.length === 0 ? '<div class="empty">No one here yet</div>' : stageClients.map(c => {
      const d = c.reminder_date ? daysUntil(c.reminder_date) : null;
      const tagsHtml = c.tags.length ? `<div class="card-tags">${c.tags.map(t => `<span class="chip" style="border-color:${tagColor(t)};color:${tagColor(t)}">${esc(t)}</span>`).join("")}</div>` : "";
      const remHtml = d !== null ? `<div class="reminder-badge${d<=0?' overdue':''}">📅 ${d<0?Math.abs(d)+'d overdue':d===0?'Due today':'in '+d+'d'}</div>` : "";
      return `<button class="card" data-id="${c.id}">
        <div class="card-name">${esc(c.name)}</div>
        <div class="card-meta">📍 ${esc(c.location)||"—"}</div>
        <div class="card-meta">💼 ${esc(c.last_service)||"—"}</div>
        ${tagsHtml}${remHtml}
      </button>`;
    }).join("");
    return `<section class="column">
      <div class="column-head"><span class="numeral" style="color:${stage.color}">${stage.numeral}</span><span class="column-label">${stage.label}</span><span class="column-count">${stageClients.length}</span></div>
      <div class="column-rule" style="background:${stage.color}"></div>
      <div class="cards">${cards}</div>
    </section>`;
  }).join("");
  board.querySelectorAll(".card").forEach(btn => btn.addEventListener("click", () => { clientSelectedId = btn.dataset.id; openClientDrawer(); }));
  renderTagFilter();
}

function openClientDrawer() {

  const drawer = $("drawer");
  drawer.innerHTML = `

    <div class="field-row">💼 <span>${esc(c.occupation)||"—"}</span></div>
    <div class="field-row">📍 <span>${esc(c.location)||"—"}</span></div>
    <div class="field-row">🕒 <span>${esc(c.last_service)||"—"} · ${esc(c.price_point)||"—"} · last visit ${esc(c.last_visit)||"—"}</span></div>
    <div class="section-label">Stage</div>
    <div class="stage-picker">${STAGES.map(s => `<button class="stage-pill${c.stage===s.key?' active':''}" style="${c.stage===s.key?`border-color:${s.color};color:${s.color}`:''}" data-stage="${s.key}">${s.label}</button>`).join("")}</div>
    <div class="section-label">Tags</div>

      ${c.tags.map(t => `<span class="chip" style="border-color:${tagColor(t)};color:${tagColor(t)}">${esc(t)} <span data-remove-tag="${esc(t)}" style="margin-left:4px;cursor:pointer">✕</span></span>`).join("")}
      <input class="tag-input" id="tagInput" placeholder="+ tag">
    </div>
    <div class="section-label">Follow-up reminder</div>
    <div class="reminder-edit">
      <input type="date" class="date-input" id="reminderDate" value="${c.reminder_date||''}">
      <input type="text" class="note-input" id="reminderNote" placeholder="What to follow up on…" value="${esc(c.reminder_note)}">
    </div>
    <div class="section-label">Notes</div>
    <textarea class="notes" rows="4" id="notesField" placeholder="Conversation history, preferences…">${esc(c.notes)}</textarea>

  `;
  $("closeDrawer").onclick = closeDrawer;

  drawer.querySelectorAll("[data-remove-tag]").forEach(btn => btn.onclick = async () => { await patchClient(c.id, { tags: c.tags.filter(t => t !== btn.dataset.removeTag) }); openClientDrawer(); });
  $("tagInput").addEventListener("keydown", async e => {
    if (e.key === "Enter") {
      const t = e.target.value.trim();
      if (t && !c.tags.includes(t)) { await patchClient(c.id, { tags: [...c.tags, t] }); openClientDrawer(); }
    }
  });
  $("reminderDate").addEventListener("change", async e => { await patchClient(c.id, { reminder_date: e.target.value || null }); });
  $("reminderNote").addEventListener("change", async e => { await patchClient(c.id, { reminder_note: e.target.value }); });
  $("notesField").addEventListener("change", async e => { await patchClient(c.id, { notes: e.target.value }); });
  $("deleteBtn").onclick = () => {
    $("drawerFooter").innerHTML = `<div class="confirm-row"><span>Remove permanently?</span><button class="confirm-yes" id="confirmYes">✓ Yes</button><button class="confirm-no" id="confirmNo">Cancel</button></div>`;
    $("confirmYes").onclick = () => deleteClient(c.id);

  $("drawerOverlay").classList.add("show");
}

/* ───────────────────── Calendar ───────────────────── */
document.querySelectorAll("#bizTabs .tab").forEach(t => t.onclick = () => { biz = t.dataset.biz; document.querySelectorAll("#bizTabs .tab").forEach(x=>x.classList.toggle("active", x===t)); loadAllCalendar(); });
$("prevWeek").onclick = () => { weekStart = new Date(weekStart.getTime() - 7*86400000); loadWeek(); };
$("nextWeek").onclick = () => { weekStart = new Date(weekStart.getTime() + 7*86400000); loadWeek(); };

async function loadAllCalendar() {
  $("loadingState").style.display = "block";
  $("app").style.display = "none";
  try {
    await Promise.all([loadDue(), loadWeek()]);
    $("loadingState").style.display = "none";
    $("app").style.display = "block";
  } catch (e) {
    console.error(e);
    $("loadingState").innerHTML = "Couldn't load — session may have expired.<br><br>" +
      '<button class="btn-primary" style="width:auto;display:inline-flex" onclick="logout()">Log out and try again</button>';
  }
}

async function loadDue() {
  const now = new Date();
  const dayFrom = now.toISOString();
  const dayTo = new Date(now.getTime() + 48*3600000).toISOString();
  const hourTo = new Date(now.getTime() + 2*3600000).toISOString();
  const [dayBefore, hourBefore] = await Promise.all([
    api(`/rest/v1/bookings?business=eq.${biz}&status=in.(tentative,confirmed)&day_before_sent_at=is.null&start_at=gte.${dayFrom}&start_at=lte.${dayTo}&select=*,services(name)&order=start_at.asc`),
    api(`/rest/v1/bookings?business=eq.${biz}&status=in.(tentative,confirmed)&hour_before_sent_at=is.null&start_at=gte.${dayFrom}&start_at=lte.${hourTo}&select=*,services(name)&order=start_at.asc`),
  ]);
  renderDue(dayBefore, hourBefore);
}

function dueMessage(b, kind) {
  const name = (b.client_name||"there").split(" ")[0];
  const when = fmtWhen(b.start_at, { weekday:"long", hour:"numeric", minute:"2-digit" });
  const link = location.origin + location.pathname.replace(/eleganza-crm-dashboard\.html$/, "") + "confirm.html?token=" + b.confirm_token;
  if (kind === "day") {
    return biz === "enbfocus"
      ? `Hi ${name}, just checking in — you're booked for a 15-min discovery call on ${when}. Still good for you? Confirm or reschedule: ${link}`
      : `Hi ${name}, reminder for tomorrow's appointment: ${when}.${b.status==='tentative'?' This time is being held — please confirm or pick a new one:':' Confirm or reschedule here:'} ${link}`;
  }
  return biz === "enbfocus"
    ? `Hey ${name} — all set for the call! See you at ${fmtWhen(b.start_at,{hour:'numeric',minute:'2-digit'})}. 🎯`
    : `Hi ${name}, 1-hour reminder — see you at ${fmtWhen(b.start_at,{hour:'numeric',minute:'2-digit'})}!${(CONFIG.BUSINESS_WHATSAPP_NUMBER && CONFIG.BUSINESS_WHATSAPP_NUMBER.indexOf("PASTE_")!==0) ? ' On your way? Message me: https://wa.me/'+CONFIG.BUSINESS_WHATSAPP_NUMBER : ''}`;
}

function renderDue(dayBefore, hourBefore) {
  const rows = [
    ...dayBefore.map(b => ({ b, kind: "day", label: "Day-before" })),
    ...hourBefore.map(b => ({ b, kind: "hour", label: "Hour-before" })),
  ];
  if (!rows.length) { $("dueList").innerHTML = `<div class="empty">Nothing due right now — reminders will appear here as they come up.</div>`; return; }
  $("dueList").innerHTML = rows.map(({b,kind,label}) => {
    const to = intlPhone(b.client_phone);
    const msg = dueMessage(b, kind);
    const waUrl = to ? `https://wa.me/${to}?text=${encodeURIComponent(msg)}` : null;
    return `<div class="due-row">
      <div class="due-info"><strong>${esc(b.client_name)}</strong> — ${esc(b.services?.name||"")}<br>${fmtWhen(b.start_at,{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}<span class="due-badge">${label}</span></div>
      <div class="due-actions">
        ${waUrl ? `<a class="wa" href="${waUrl}" target="_blank" rel="noopener" style="text-decoration:none;display:inline-block;padding:6px 10px;border-radius:3px;border:1px solid var(--sage);color:#A8C3A0;font-size:11.5px">Send WhatsApp</a>` : ""}
        <button data-mark="${b.id}" data-kind="${kind}">Mark sent</button>
      </div>
    </div>`;
  }).join("");
  $("dueList").querySelectorAll("[data-mark]").forEach(btn => btn.onclick = async () => {
    const field = btn.dataset.kind === "day" ? "day_before_sent_at" : "hour_before_sent_at";
    await api(`/rest/v1/bookings?id=eq.${btn.dataset.mark}`, { method: "PATCH", headers: { Prefer: "return=minimal" }, body: JSON.stringify({ [field]: new Date().toISOString() }) });
    showToast("Marked as sent");
    loadDue();
  });
}

async function loadWeek() {
  const weekEnd = new Date(weekStart.getTime() + 7*86400000);
  $("weekLabel").textContent = weekStart.toLocaleDateString("en-US",{month:'short',day:'numeric'}) + " – " + new Date(weekEnd.getTime()-86400000).toLocaleDateString("en-US",{month:'short',day:'numeric'});
  bookings = await api(`/rest/v1/bookings?business=eq.${biz}&start_at=gte.${weekStart.toISOString()}&start_at=lt.${weekEnd.toISOString()}&status=neq.cancelled&select=*,services(name,duration_minutes)&order=start_at.asc`);
  renderWeek();
}

function renderWeek() {
  const board = $("weekBoard");
  const days = [];
  for (let i=0;i<7;i++) days.push(new Date(weekStart.getTime()+i*86400000));
  board.innerHTML = days.map(d => {
    const dStr = d.toISOString().slice(0,10);
    const dayBookings = bookings.filter(b => new Date(b.start_at).toLocaleDateString("en-CA",{timeZone:TZ}) === dStr);
    const rows = dayBookings.length
      ? dayBookings.map(b => `
        <div class="booking-row" data-id="${b.id}">
          <div class="booking-time">${fmtWhen(b.start_at,{hour:'numeric',minute:'2-digit'})}</div>
          <div class="booking-info"><div class="name">${esc(b.client_name)}</div><div class="meta">${esc(b.services?.name||"")}</div></div>
          <span class="status-pill status-${b.status}">${b.status.replace('_',' ')}</span>
        </div>`).join("")
      : `<div class="empty">No bookings</div>`;
    return `<div class="day-group">
      <div class="day-head">${d.toLocaleDateString("en-US",{weekday:'long',month:'short',day:'numeric'})}</div>
      ${rows}
    </div>`;
  }).join("");
  board.querySelectorAll("[data-id]").forEach(row => row.onclick = () => openBookingDrawer(row.dataset.id));
}

async function openBookingDrawer(id) {
  bookingSelectedId = id;
  const b = bookings.find(x => x.id === id) || await api(`/rest/v1/bookings?id=eq.${id}&select=*,services(name,duration_minutes)`).then(r=>r[0]);
  let lead = null;
  if (biz === "enbfocus") {
    const leads = await api(`/rest/v1/enbfocus_leads?booking_id=eq.${id}&select=*`);
    lead = leads && leads[0];
  }
  const drawer = $("drawer");
  drawer.innerHTML = `
    <div class="drawer-head"><h2>${esc(b.client_name)}</h2><button class="icon-btn" id="closeDrawer">✕</button></div>
    <div class="field-row">📞 <strong>${esc(b.client_phone)||"—"}</strong></div>
    <div class="field-row">✉️ <strong>${esc(b.client_email)||"—"}</strong></div>
    <div class="field-row">💼 <strong>${esc(b.services?.name||"")}</strong> · ${fmtWhen(b.start_at,{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}</div>
    <div class="field-row">Status <strong>${b.status.replace('_',' ')}</strong></div>
    ${b.notes ? `<div class="field-row">Notes <strong>${esc(b.notes)}</strong></div>` : ""}
    <div class="section-label">Actions</div>
    <div class="action-row">
      ${b.status==='tentative' ? `<button class="primary" data-act="confirm">Confirm</button>` : ""}
      ${['tentative','confirmed'].includes(b.status) ? `<button data-act="checkin">Mark checked-in</button>` : ""}
      ${['confirmed','checked_in'].includes(b.status) ? `<button data-act="complete">Complete + receipt</button>` : ""}
      ${b.status==='confirmed' ? `<button data-act="noshow">No-show</button>` : ""}
      ${!['cancelled','completed'].includes(b.status) ? `<button class="danger" data-act="cancel">Cancel</button>` : ""}
    </div>
    <div class="section-label">Reschedule</div>
    <input type="date" id="reDate" value="${fmtWhen(b.start_at,{year:'numeric',month:'2-digit',day:'2-digit'}).split('/').reverse().join('-')}">
    <input type="time" id="reTime" value="${fmtWhen(b.start_at,{hour:'2-digit',minute:'2-digit',hourCycle:'h23'})}">
    <div class="action-row"><button id="btnReschedule">Save new time</button></div>
    ${lead ? `
      <div class="section-label">Discovery Call Intake</div>
      <div class="intake-box">
        <strong>Business / platform</strong>${esc(lead.business_name)||"—"} · ${esc(lead.platform)||"—"}
        <strong>Audience is asking for</strong>${esc(lead.audience_notes)||"—"}
        <strong>Revenue goal</strong>${esc(lead.revenue_goal)||"—"}
      </div>
      <div class="section-label">Pipeline Stage</div>
      <div class="stage-picker" id="stagePicker">
        ${["lead","discovery_booked","discovery_done","proposal","client","not_a_fit"].map(s => `<button class="enbfocus-stage-pill${lead.stage===s?' active':''}" data-stage="${s}">${s.replace('_',' ')}</button>`).join("")}
      </div>
    ` : ""}
  `;
  $("closeDrawer").onclick = closeDrawer;
  drawer.querySelectorAll("[data-act]").forEach(btn => btn.onclick = () => handleBookingAction(b, btn.dataset.act));
  $("btnReschedule").onclick = async () => {
    const date = $("reDate").value, time = $("reTime").value;
    if (!date || !time) return;
    try {
      await rpc("reschedule_booking", { p_token: b.confirm_token, p_new_start_at: new Date(`${date}T${time}:00-04:00`).toISOString() });
      showToast("Rescheduled"); closeDrawer(); loadAllCalendar();
    } catch (e) { showToast("That time isn't available"); }
  };
  if (lead) {
    drawer.querySelectorAll("[data-stage]").forEach(btn => btn.onclick = async () => {
      await api(`/rest/v1/enbfocus_leads?id=eq.${lead.id}`, { method:"PATCH", headers:{Prefer:"return=minimal"}, body: JSON.stringify({ stage: btn.dataset.stage }) });
      showToast("Stage updated"); openBookingDrawer(id);
    });
  }
  $("drawerOverlay").classList.add("show");
}

async function handleBookingAction(b, act) {
  try {
    if (act === "confirm") { await rpc("confirm_booking", { p_token: b.confirm_token }); showToast("Confirmed"); }
    else if (act === "cancel") { await rpc("cancel_booking", { p_token: b.confirm_token }); showToast("Cancelled"); }
    else if (act === "checkin") { await api(`/rest/v1/bookings?id=eq.${b.id}`, { method:"PATCH", headers:{Prefer:"return=minimal"}, body: JSON.stringify({ status:"checked_in", checked_in_at: new Date().toISOString() }) }); showToast("Checked in"); }
    else if (act === "noshow") { await api(`/rest/v1/bookings?id=eq.${b.id}`, { method:"PATCH", headers:{Prefer:"return=minimal"}, body: JSON.stringify({ status:"no_show" }) }); showToast("Marked no-show"); }
    else if (act === "complete") { return openCompleteModal(b); }
    closeDrawer(); loadAllCalendar();
  } catch (e) { console.error(e); showToast("Something went wrong"); }
}

    </select>
    <label class="section-label">Date</label><input type="date" class="input-full" id="f_bdate">
    <label class="section-label">Time</label><input type="time" class="input-full" id="f_btime">
    <button class="btn-primary" id="submitNewBooking" style="width:100%">Create Booking</button>
    <div class="login-msg" id="newBookingErr"></div>
  `;
  $("closeModal").onclick = closeModal;
  $("submitNewBooking").onclick = async () => {
    const name = $("f_bname").value.trim();
    const date = $("f_bdate").value, time = $("f_btime").value;
    if (!name || !date || !time) { $("newBookingErr").textContent = "Name, date, and time are required."; return; }
    try {
      await rpc("create_booking", {
        p_business: biz, p_service_id: $("f_bservice").value,
        p_start_at: new Date(`${date}T${time}:00-04:00`).toISOString(),
        p_name: name, p_phone: $("f_bphone").value.trim(), p_email: $("f_bemail").value.trim()
      });
      closeModal(); showToast("Booking created"); loadAllCalendar();
    } catch (e) {
      $("newBookingErr").textContent = String(e.message||"").includes("slot_taken") ? "That time is already booked." : "Something went wrong.";
    }
  };
  $("modalOverlay").classList.add("show");
};

/* ───────────────────── Shared drawer/modal/login ───────────────────── */
function closeDrawer() { $("drawerOverlay").classList.remove("show"); clientSelectedId = null; bookingSelectedId = null; }
function closeModal() { $("modalOverlay").classList.remove("show"); }

$("addBtn").onclick = openAddModal;
$("logoutBtn").onclick = logout;
$("drawerOverlay").addEventListener("click", e => { if (e.target.id === "drawerOverlay") closeDrawer(); });
$("modalOverlay").addEventListener("click", e => { if (e.target.id === "modalOverlay") closeModal(); });
$("searchInput").addEventListener("input", e => { search = e.target.value; renderBoard(); });
$("tagFilter").addEventListener("change", e => { tagFilter = e.target.value; renderBoard(); });
$("reminderToggle").addEventListener("click", function() { remindersOnly = !remindersOnly; this.classList.toggle("active", remindersOnly); renderBoard(); });

const startView = new URLSearchParams(location.search).get("view") === "calendar" ? "calendar" : "clients";

$("loginBtn").onclick = async () => {
  const email = $("loginEmail").value.trim();
  const password = $("loginPassword").value;
  const msgEl = $("loginMsg");
  msgEl.textContent = "";
  try {
    await login(email, password);
    $("loginScreen").style.display = "none";
    await setView(startView);
  } catch (e) {
    msgEl.textContent = "Incorrect email or password.";
  }
};

(async function init() {
  const saved = localStorage.getItem(SESSION_KEY);
  if (saved) {
    session = JSON.parse(saved);
    $("loginScreen").style.display = "none";
    await setView(startView);
  }
})();
</script>
</body>
</html>
