<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar — Eleganza &amp; ENBfocus</title>
<link rel="apple-touch-icon" href="logo-gold.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Eleganza Calendar">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#15120F">
<style>
  :root {
    --bg: #15120F; --surface: #1E1A16; --border: #2A251E; --border2: #3A3328;
    --text: #F5F0E6; --muted: #E8DFD3; --muted2: #6B665C; --dim: #D9D0C3;
    --gold: #C9A14A; --teal: #6E8C8A; --sage: #7C9473; --terracotta: #B5654A; --zest:#C6F24E;
    --font-display: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); }
  button, input, select, textarea { font-family: var(--font-body); }
  button { cursor: pointer; }

  #loginScreen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .login-box { width: 100%; max-width: 360px; text-align: center; }
  .eyebrow { font-size: 11px; letter-spacing: 0.22em; color: var(--gold); font-weight: 600; }
  .login-box h1 { font-family: var(--font-display); font-size: 26px; margin: 4px 0 28px; font-weight: 500; }
  .login-box input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 12px 14px; font-size: 15px; color: var(--text); outline: none; margin-bottom: 10px; }
  .login-box button { width: 100%; background: var(--gold); color: var(--bg); border: none; padding: 13px; border-radius: 4px; font-weight: 600; font-size: 14px; margin-top: 8px; }
  .login-msg { font-size: 13px; color: #D98E78; margin-top: 12px; min-height: 16px; }

  #app { display: none; }
  header { position: sticky; top: 0; z-index: 10; background: linear-gradient(180deg, var(--bg) 85%, rgba(21,18,15,0)); backdrop-filter: blur(6px); padding: 18px 20px 12px; border-bottom: 1px solid var(--border); }
  .header-inner { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
  h1.title { font-family: var(--font-display); font-size: 24px; font-weight: 500; }
  .tabs { display: flex; gap: 6px; margin-top: 12px; }
  .tab { background: var(--surface); border: 1px solid var(--border); color: var(--dim); padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; }
  .tab.active { border-color: var(--gold); color: var(--gold); background: rgba(201,161,74,0.1); }
  .tab[data-biz="enbfocus"].active { border-color: var(--zest); color: var(--zest); background: rgba(198,242,78,0.08); }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-primary { background: var(--gold); color: var(--bg); border: none; padding: 9px 16px; border-radius: 3px; font-weight: 600; font-size: 13px; }
  .btn-ghost { background: var(--surface); color: var(--dim); border: 1px solid var(--border); padding: 9px 14px; border-radius: 3px; font-size: 13px; }

  main.wrap { padding: 20px; max-width: 900px; margin: 0 auto; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px; margin-bottom: 20px; }
  .panel-title { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted2); margin-bottom: 12px; font-weight: 600; }
  .due-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .due-row:last-child { border-bottom: none; }
  .due-info { font-size: 13px; }
  .due-info strong { font-family: var(--font-display); font-size: 15px; font-weight: 500; }
  .due-badge { font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 8px; border-radius: 20px; border: 1px solid var(--terracotta); color: #D98E78; margin-left: 8px; }
  .due-actions { display: flex; gap: 6px; }
  .due-actions button { font-size: 11.5px; padding: 6px 10px; border-radius: 3px; border: 1px solid var(--border); background: var(--bg); color: var(--dim); }
  .due-actions button.wa { border-color: var(--sage); color: #A8C3A0; }
  .empty { color: #5A554B; font-size: 13px; font-style: italic; padding: 6px 0; }

  .week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .week-nav button { background: var(--surface); border: 1px solid var(--border); color: var(--dim); padding: 6px 12px; border-radius: 3px; }
  .week-label { font-family: var(--font-display); font-size: 16px; }
  .day-group { margin-bottom: 16px; }
  .day-head { font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted2); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .booking-row { display: flex; align-items: center; gap: 10px; padding: 10px 8px; border-radius: 4px; cursor: pointer; }
  .booking-row:hover { background: var(--bg); }
  .booking-time { font-family: var(--font-display); font-size: 14px; width: 70px; flex-shrink: 0; color: var(--gold); }
  .booking-info { flex: 1; font-size: 13px; }
  .booking-info .name { font-weight: 600; }
  .booking-info .meta { color: var(--muted2); font-size: 11.5px; margin-top: 2px; }
  .status-pill { font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; padding: 3px 8px; border-radius: 20px; border: 1px solid; flex-shrink: 0; }
  .status-tentative { border-color: var(--terracotta); color: #D98E78; }
  .status-confirmed { border-color: var(--gold); color: var(--gold); }
  .status-checked_in { border-color: var(--teal); color: var(--teal); }
  .status-completed { border-color: var(--sage); color: var(--sage); }
  .status-cancelled { border-color: var(--muted2); color: var(--muted2); }
  .status-no_show { border-color: var(--terracotta); color: var(--terracotta); }

  .overlay { position: fixed; inset: 0; background: rgba(10,8,6,0.7); z-index: 50; display: none; justify-content: flex-end; }
  .overlay.show { display: flex; }
  .overlay.center { justify-content: center; align-items: center; }
  .drawer { width: 100%; max-width: 420px; background: #18140F; height: 100%; overflow-y: auto; padding: 22px; border-left: 1px solid var(--border); }
  .modal { width: 92%; max-width: 420px; background: #18140F; border-radius: 6px; padding: 22px; border: 1px solid var(--border); max-height: 86vh; overflow-y: auto; }
  .drawer-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .drawer-head h2 { font-family: var(--font-display); font-size: 20px; font-weight: 500; }
  .icon-btn { background: none; border: none; color: var(--muted); font-size: 18px; line-height: 1; }
  .field-row { font-size: 13px; color: var(--dim); margin-bottom: 8px; }
  .field-row strong { color: var(--text); }
  .section-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted2); margin: 18px 0 8px; }
  .action-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
  .action-row button { flex: 1; min-width: 110px; padding: 10px; border-radius: 3px; border: 1px solid var(--border); background: var(--surface); color: var(--dim); font-size: 12.5px; }
  .action-row button.primary { border-color: var(--gold); color: var(--gold); }
  .action-row button.danger { border-color: var(--terracotta); color: #D98E78; }
  input[type=date], input[type=time], input[type=number], input[type=text], .note-input { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 9px 10px; font-size: 13px; color: var(--text); outline: none; width: 100%; margin-top: 6px; }
  .input-full { width: 100%; margin-bottom: 10px; }
  .stage-picker { display: flex; flex-wrap: wrap; gap: 6px; }
  .stage-pill { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 20px; font-size: 12px; }
  .stage-pill.active { border-color: var(--zest); color: var(--zest); background: rgba(198,242,78,0.08); }
  .intake-box { font-size: 12.5px; color: var(--dim); line-height: 1.6; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 12px; }
  .intake-box strong { color: var(--text); display: block; margin-top: 8px; }
  .intake-box strong:first-child { margin-top: 0; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--border); color: var(--text); padding: 10px 18px; border-radius: 4px; font-size: 13px; z-index: 100; border: 1px solid var(--border2); display: none; }
  .toast.show { display: block; }
  .loading-state { padding: 60px 20px; text-align: center; color: var(--muted); }
  @media (max-width: 480px) { .drawer, .modal { max-width: 100%; } .booking-time { width: 56px; } }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="eyebrow">ELEGANZA · ENBFOCUS</div>
    <h1>Calendar</h1>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button id="loginBtn">Log in</button>
    <div class="login-msg" id="loginMsg"></div>
  </div>
</div>

<div id="app">
  <header>
    <div class="header-inner">
      <div>
        <div class="eyebrow">CALENDAR</div>
        <h1 class="title">Bookings</h1>
      </div>
      <div class="header-actions">
        <a class="btn-ghost" href="eleganza-crm-dashboard.html" style="text-decoration:none;display:inline-flex;align-items:center">Client Ledger</a>
        <button class="btn-ghost" id="logoutBtn">Log out</button>
        <button class="btn-ghost" id="blockBtn">Block time off</button>
        <button class="btn-primary" id="newBtn">+ New booking</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" data-biz="eleganza">Eleganza</button>
      <button class="tab" data-biz="enbfocus">ENBfocus</button>
    </div>
  </header>

  <main class="wrap">
    <div class="panel" id="duePanel">
      <div class="panel-title">Reminders due now</div>
      <div id="dueList"></div>
    </div>

    <div class="week-nav">
      <button id="prevWeek">← Prev</button>
      <div class="week-label" id="weekLabel"></div>
      <button id="nextWeek">Next →</button>
    </div>
    <div id="weekBoard"></div>
  </main>
</div>

<div class="loading-state" id="loadingState" style="display:none;">Loading calendar…</div>

<div class="overlay" id="drawerOverlay"><div class="drawer" id="drawer"></div></div>
<div class="overlay center" id="modalOverlay"><div class="modal" id="modalContent"></div></div>
<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script>
const SUPABASE_URL = CONFIG.SUPABASE_URL;
const SUPABASE_KEY = CONFIG.SUPABASE_ANON_KEY;
const SESSION_KEY = "eleganza-crm-session";
const TZ = "America/Port_of_Spain";

let session = null;
let biz = "eleganza";
let weekStart = startOfWeek(new Date());
let bookings = [];
let selectedId = null;

function $(id) { return document.getElementById(id); }
function esc(s) { return (s||"").toString().replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function showToast(msg) { const t=$("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2200); }
function startOfWeek(d) { const x = new Date(d); const day = x.getDay(); x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x; }
function fmtWhen(iso, opts) { return new Date(iso).toLocaleString("en-US", { timeZone: TZ, ...opts }); }
function digits(s) { return (s||"").replace(/\D/g,""); }
function intlPhone(phone) {
  const d = digits(phone);
  if (d.length === 7) return "1868" + d;
  if (d.length === 10 && d.startsWith("868")) return "1" + d;
  if (d.length === 11 && d.startsWith("1868")) return d;
  if (d.length >= 10) return d;
  return "";
}

async function api(path, opts = {}) {
  const headers = { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${session.access_token}`, "Content-Type": "application/json", ...opts.headers };
  const res = await fetch(`${SUPABASE_URL}${path}`, { ...opts, headers });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}
async function rpc(fn, body) { return api(`/rest/v1/rpc/${fn}`, { method: "POST", body: JSON.stringify(body) }); }

async function login(email, password) {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
    method: "POST", headers: { "Content-Type": "application/json", "apikey": SUPABASE_KEY },
    body: JSON.stringify({ email, password }),
  });
  if (!res.ok) throw new Error("Invalid login");
  session = await res.json();
  localStorage.setItem(SESSION_KEY, JSON.stringify(session));
}
function logout() {
  session = null;
  localStorage.removeItem(SESSION_KEY);
  $("app").style.display = "none";
  $("loginScreen").style.display = "flex";
}

document.querySelectorAll(".tab").forEach(t => t.onclick = () => { biz = t.dataset.biz; document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active", x===t)); loadAll(); });
$("prevWeek").onclick = () => { weekStart = new Date(weekStart.getTime() - 7*86400000); loadWeek(); };
$("nextWeek").onclick = () => { weekStart = new Date(weekStart.getTime() + 7*86400000); loadWeek(); };
$("logoutBtn").onclick = logout;

async function loadAll() {
  $("loadingState").style.display = "block";
  $("app").style.display = "none";
  try {
    await Promise.all([loadDue(), loadWeek()]);
    $("loadingState").style.display = "none";
    $("app").style.display = "block";
  } catch (e) {
    console.error(e);
    $("loadingState").textContent = "Couldn't load — session may have expired. Please log out and back in.";
  }
}

async function loadDue() {
  const now = new Date();
  const dayFrom = now.toISOString();
  const dayTo = new Date(now.getTime() + 48*3600000).toISOString();
  const hourTo = new Date(now.getTime() + 2*3600000).toISOString();
  const [dayBefore, hourBefore] = await Promise.all([
    api(`/rest/v1/bookings?business=eq.${biz}&status=in.(tentative,confirmed)&day_before_sent_at=is.null&start_at=gte.${dayFrom}&start_at=lte.${dayTo}&select=*,services(name)&order=start_at.asc`),
    api(`/rest/v1/bookings?business=eq.${biz}&status=in.(tentative,confirmed)&hour_before_sent_at=is.null&start_at=gte.${dayFrom}&start_at=lte.${hourTo}&select=*,services(name)&order=start_at.asc`),
  ]);
  renderDue(dayBefore, hourBefore);
}

function dueMessage(b, kind) {
  const name = (b.client_name||"there").split(" ")[0];
  const when = fmtWhen(b.start_at, { weekday:"long", hour:"numeric", minute:"2-digit" });
  const link = location.origin + location.pathname.replace(/admin-calendar\.html$/, "") + "confirm.html?token=" + b.confirm_token;
  if (kind === "day") {
    return biz === "enbfocus"
      ? `Hi ${name}, just checking in — you're booked for a 15-min discovery call on ${when}. Still good for you? Confirm or reschedule: ${link}`
      : `Hi ${name}, reminder for tomorrow's appointment: ${when}.${b.status==='tentative'?' This time is being held — please confirm or pick a new one:':' Confirm or reschedule here:'} ${link}`;
  }
  return biz === "enbfocus"
    ? `Hey ${name} — all set for the call! See you at ${fmtWhen(b.start_at,{hour:'numeric',minute:'2-digit'})}. 🎯`
    : `Hi ${name}, 1-hour reminder — see you at ${fmtWhen(b.start_at,{hour:'numeric',minute:'2-digit'})}!${(CONFIG.BUSINESS_WHATSAPP_NUMBER && CONFIG.BUSINESS_WHATSAPP_NUMBER.indexOf("PASTE_")!==0) ? ' On your way? Message me: https://wa.me/'+CONFIG.BUSINESS_WHATSAPP_NUMBER : ''}`;
}

function renderDue(dayBefore, hourBefore) {
  const rows = [
    ...dayBefore.map(b => ({ b, kind: "day", label: "Day-before" })),
    ...hourBefore.map(b => ({ b, kind: "hour", label: "Hour-before" })),
  ];
  if (!rows.length) { $("dueList").innerHTML = `<div class="empty">Nothing due right now — reminders will appear here as they come up.</div>`; return; }
  $("dueList").innerHTML = rows.map(({b,kind,label}) => {
    const to = intlPhone(b.client_phone);
    const msg = dueMessage(b, kind);
    const waUrl = to ? `https://wa.me/${to}?text=${encodeURIComponent(msg)}` : null;
    return `<div class="due-row">
      <div class="due-info"><strong>${esc(b.client_name)}</strong> — ${esc(b.services?.name||"")}<br>${fmtWhen(b.start_at,{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}<span class="due-badge">${label}</span></div>
      <div class="due-actions">
        ${waUrl ? `<a class="wa" href="${waUrl}" target="_blank" rel="noopener" style="text-decoration:none;display:inline-block;padding:6px 10px;border-radius:3px;border:1px solid var(--sage);color:#A8C3A0;font-size:11.5px">Send WhatsApp</a>` : ""}
        <button data-mark="${b.id}" data-kind="${kind}">Mark sent</button>
      </div>
    </div>`;
  }).join("");
  $("dueList").querySelectorAll("[data-mark]").forEach(btn => btn.onclick = async () => {
    const field = btn.dataset.kind === "day" ? "day_before_sent_at" : "hour_before_sent_at";
    await api(`/rest/v1/bookings?id=eq.${btn.dataset.mark}`, { method: "PATCH", headers: { Prefer: "return=minimal" }, body: JSON.stringify({ [field]: new Date().toISOString() }) });
    showToast("Marked as sent");
    loadDue();
  });
}

async function loadWeek() {
  const weekEnd = new Date(weekStart.getTime() + 7*86400000);
  $("weekLabel").textContent = weekStart.toLocaleDateString("en-US",{month:'short',day:'numeric'}) + " – " + new Date(weekEnd.getTime()-86400000).toLocaleDateString("en-US",{month:'short',day:'numeric'});
  bookings = await api(`/rest/v1/bookings?business=eq.${biz}&start_at=gte.${weekStart.toISOString()}&start_at=lt.${weekEnd.toISOString()}&status=neq.cancelled&select=*,services(name,duration_minutes)&order=start_at.asc`);
  renderWeek();
}

function renderWeek() {
  const board = $("weekBoard");
  const days = [];
  for (let i=0;i<7;i++) days.push(new Date(weekStart.getTime()+i*86400000));
  board.innerHTML = days.map(d => {
    const dStr = d.toISOString().slice(0,10);
    const dayBookings = bookings.filter(b => new Date(b.start_at).toLocaleDateString("en-CA",{timeZone:TZ}) === dStr);
    const rows = dayBookings.length
      ? dayBookings.map(b => `
        <div class="booking-row" data-id="${b.id}">
          <div class="booking-time">${fmtWhen(b.start_at,{hour:'numeric',minute:'2-digit'})}</div>
          <div class="booking-info"><div class="name">${esc(b.client_name)}</div><div class="meta">${esc(b.services?.name||"")}</div></div>
          <span class="status-pill status-${b.status}">${b.status.replace('_',' ')}</span>
        </div>`).join("")
      : `<div class="empty">No bookings</div>`;
    return `<div class="day-group">
      <div class="day-head">${d.toLocaleDateString("en-US",{weekday:'long',month:'short',day:'numeric'})}</div>
      ${rows}
    </div>`;
  }).join("");
  board.querySelectorAll("[data-id]").forEach(row => row.onclick = () => openDrawer(row.dataset.id));
}

async function openDrawer(id) {
  selectedId = id;
  const b = bookings.find(x => x.id === id) || await api(`/rest/v1/bookings?id=eq.${id}&select=*,services(name,duration_minutes)`).then(r=>r[0]);
  let lead = null;
  if (biz === "enbfocus") {
    const leads = await api(`/rest/v1/enbfocus_leads?booking_id=eq.${id}&select=*`);
    lead = leads && leads[0];
  }
  const drawer = $("drawer");
  drawer.innerHTML = `
    <div class="drawer-head"><h2>${esc(b.client_name)}</h2><button class="icon-btn" id="closeDrawer">✕</button></div>
    <div class="field-row">📞 <strong>${esc(b.client_phone)||"—"}</strong></div>
    <div class="field-row">✉️ <strong>${esc(b.client_email)||"—"}</strong></div>
    <div class="field-row">💼 <strong>${esc(b.services?.name||"")}</strong> · ${fmtWhen(b.start_at,{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}</div>
    <div class="field-row">Status <strong>${b.status.replace('_',' ')}</strong></div>
    ${b.notes ? `<div class="field-row">Notes <strong>${esc(b.notes)}</strong></div>` : ""}
    <div class="section-label">Actions</div>
    <div class="action-row">
      ${b.status==='tentative' ? `<button class="primary" data-act="confirm">Confirm</button>` : ""}
      ${['tentative','confirmed'].includes(b.status) ? `<button data-act="checkin">Mark checked-in</button>` : ""}
      ${['confirmed','checked_in'].includes(b.status) ? `<button data-act="complete">Complete + receipt</button>` : ""}
      ${b.status==='confirmed' ? `<button data-act="noshow">No-show</button>` : ""}
      ${!['cancelled','completed'].includes(b.status) ? `<button class="danger" data-act="cancel">Cancel</button>` : ""}
    </div>
    <div class="section-label">Reschedule</div>
    <input type="date" id="reDate" value="${fmtWhen(b.start_at,{year:'numeric',month:'2-digit',day:'2-digit'}).split('/').reverse().join('-')}">
    <input type="time" id="reTime" value="${fmtWhen(b.start_at,{hour:'2-digit',minute:'2-digit',hourCycle:'h23'})}">
    <div class="action-row"><button id="btnReschedule">Save new time</button></div>
    ${lead ? `
      <div class="section-label">Discovery Call Intake</div>
      <div class="intake-box">
        <strong>Business / platform</strong>${esc(lead.business_name)||"—"} · ${esc(lead.platform)||"—"}
        <strong>Audience is asking for</strong>${esc(lead.audience_notes)||"—"}
        <strong>Revenue goal</strong>${esc(lead.revenue_goal)||"—"}
      </div>
      <div class="section-label">Pipeline Stage</div>
      <div class="stage-picker" id="stagePicker">
        ${["lead","discovery_booked","discovery_done","proposal","client","not_a_fit"].map(s => `<button class="stage-pill${lead.stage===s?' active':''}" data-stage="${s}">${s.replace('_',' ')}</button>`).join("")}
      </div>
    ` : ""}
  `;
  $("closeDrawer").onclick = closeDrawer;
  drawer.querySelectorAll("[data-act]").forEach(btn => btn.onclick = () => handleAction(b, btn.dataset.act));
  $("btnReschedule").onclick = async () => {
    const date = $("reDate").value, time = $("reTime").value;
    if (!date || !time) return;
    try {
      await rpc("reschedule_booking", { p_token: b.confirm_token, p_new_start_at: new Date(`${date}T${time}:00-04:00`).toISOString() });
      showToast("Rescheduled"); closeDrawer(); loadAll();
    } catch (e) { showToast("That time isn't available"); }
  };
  if (lead) {
    drawer.querySelectorAll("[data-stage]").forEach(btn => btn.onclick = async () => {
      await api(`/rest/v1/enbfocus_leads?id=eq.${lead.id}`, { method:"PATCH", headers:{Prefer:"return=minimal"}, body: JSON.stringify({ stage: btn.dataset.stage }) });
      showToast("Stage updated"); openDrawer(id);
    });
  }
  $("drawerOverlay").classList.add("show");
}
function closeDrawer() { $("drawerOverlay").classList.remove("show"); selectedId = null; }

async function handleAction(b, act) {
  try {
    if (act === "confirm") { await rpc("confirm_booking", { p_token: b.confirm_token }); showToast("Confirmed"); }
    else if (act === "cancel") { await rpc("cancel_booking", { p_token: b.confirm_token }); showToast("Cancelled"); }
    else if (act === "checkin") { await api(`/rest/v1/bookings?id=eq.${b.id}`, { method:"PATCH", headers:{Prefer:"return=minimal"}, body: JSON.stringify({ status:"checked_in", checked_in_at: new Date().toISOString() }) }); showToast("Checked in"); }
    else if (act === "noshow") { await api(`/rest/v1/bookings?id=eq.${b.id}`, { method:"PATCH", headers:{Prefer:"return=minimal"}, body: JSON.stringify({ status:"no_show" }) }); showToast("Marked no-show"); }
    else if (act === "complete") { return openCompleteModal(b); }
    closeDrawer(); loadAll();
  } catch (e) { console.error(e); showToast("Something went wrong"); }
}

function openCompleteModal(b) {
  const content = $("modalContent");
  content.innerHTML = `
    <div class="drawer-head"><h2>Complete &amp; log receipt</h2><button class="icon-btn" id="closeModal">✕</button></div>
    <div class="field-row">${esc(b.client_name)} · ${esc(b.services?.name||"")}</div>
    <label class="section-label">Amount charged (TT$)</label>
    <input type="number" class="input-full" id="amount" min="0" step="any" value="${b.services?.price||''}">
    <button class="btn-primary" id="submitComplete" style="width:100%">Save &amp; Complete</button>
  `;
  $("closeModal").onclick = closeModal;
  $("submitComplete").onclick = async () => {
    const amount = parseFloat($("amount").value) || 0;
    await rpc("log_receipt", { p_booking_id: b.id, p_business: biz, p_client_id: b.client_id || null, p_client_name: b.client_name, p_service_name: b.services?.name || "", p_amount: amount });
    closeModal(); closeDrawer(); loadAll(); showToast("Completed — receipt logged");
  };
  $("modalOverlay").classList.add("show");
}
function closeModal() { $("modalOverlay").classList.remove("show"); }

$("blockBtn").onclick = () => {
  const content = $("modalContent");
  content.innerHTML = `
    <div class="drawer-head"><h2>Block time off</h2><button class="icon-btn" id="closeModal">✕</button></div>
    <label class="section-label">Date</label>
    <input type="date" class="input-full" id="blockDate">
    <label class="section-label">Reason (optional)</label>
    <input type="text" class="input-full" id="blockReason" placeholder="e.g. holiday, personal">
    <div class="field-row" style="margin-top:6px"><label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--dim)"><input type="checkbox" id="wholeDay" checked style="width:auto"> Block the whole day</label></div>
    <div id="partialTimes" style="display:none">
      <label class="section-label">From</label><input type="time" class="input-full" id="blockFrom">
      <label class="section-label">To</label><input type="time" class="input-full" id="blockTo">
    </div>
    <button class="btn-primary" id="submitBlock" style="width:100%">Block This Time</button>
  `;
  $("closeModal").onclick = closeModal;
  $("wholeDay").onchange = e => $("partialTimes").style.display = e.target.checked ? "none" : "block";
  $("submitBlock").onclick = async () => {
    const date = $("blockDate").value;
    if (!date) return;
    const wholeDay = $("wholeDay").checked;
    await api(`/rest/v1/availability_blocks`, {
      method: "POST", headers: { Prefer: "return=minimal" },
      body: JSON.stringify({
        business: biz, block_date: date, is_closed: true, reason: $("blockReason").value.trim() || null,
        start_time: wholeDay ? null : $("blockFrom").value,
        end_time: wholeDay ? null : $("blockTo").value,
      })
    });
    closeModal(); showToast("Time blocked"); loadWeek();
  };
  $("modalOverlay").classList.add("show");
};

$("newBtn").onclick = async () => {
  const services = await api(`/rest/v1/services?business=eq.${biz}&active=eq.true&select=*&order=sort_order.asc`);
  const content = $("modalContent");
  content.innerHTML = `
    <div class="drawer-head"><h2>New booking</h2><button class="icon-btn" id="closeModal">✕</button></div>
    <label class="section-label">Client name</label><input class="input-full" id="f_name">
    <label class="section-label">Phone</label><input class="input-full" id="f_phone">
    <label class="section-label">Email</label><input class="input-full" id="f_email">
    <label class="section-label">Service</label>
    <select class="input-full" id="f_service" style="padding:9px 10px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:3px">
      ${services.map(s => `<option value="${s.id}">${esc(s.name)} (${s.duration_minutes}min)</option>`).join("")}
    </select>
    <label class="section-label">Date</label><input type="date" class="input-full" id="f_date">
    <label class="section-label">Time</label><input type="time" class="input-full" id="f_time">
    <button class="btn-primary" id="submitNew" style="width:100%">Create Booking</button>
    <div class="login-msg" id="newErr"></div>
  `;
  $("closeModal").onclick = closeModal;
  $("submitNew").onclick = async () => {
    const name = $("f_name").value.trim();
    const date = $("f_date").value, time = $("f_time").value;
    if (!name || !date || !time) { $("newErr").textContent = "Name, date, and time are required."; return; }
    try {
      await rpc("create_booking", {
        p_business: biz, p_service_id: $("f_service").value,
        p_start_at: new Date(`${date}T${time}:00-04:00`).toISOString(),
        p_name: name, p_phone: $("f_phone").value.trim(), p_email: $("f_email").value.trim()
      });
      closeModal(); showToast("Booking created"); loadAll();
    } catch (e) {
      $("newErr").textContent = String(e.message||"").includes("slot_taken") ? "That time is already booked." : "Something went wrong.";
    }
  };
  $("modalOverlay").classList.add("show");
};

$("drawerOverlay").addEventListener("click", e => { if (e.target.id === "drawerOverlay") closeDrawer(); });
$("modalOverlay").addEventListener("click", e => { if (e.target.id === "modalOverlay") closeModal(); });

$("loginBtn").onclick = async () => {
  const email = $("loginEmail").value.trim();
  const password = $("loginPassword").value;
  const msgEl = $("loginMsg");
  msgEl.textContent = "";
  try {
    await login(email, password);
    $("loginScreen").style.display = "none";
    await loadAll();
  } catch (e) {
    msgEl.textContent = "Incorrect email or password.";
  }
};

(async function init() {
  const saved = localStorage.getItem(SESSION_KEY);
  if (saved) {
    session = JSON.parse(saved);
    $("loginScreen").style.display = "none";
    await loadAll();
  }
})();
</script>
</body>
</html>
